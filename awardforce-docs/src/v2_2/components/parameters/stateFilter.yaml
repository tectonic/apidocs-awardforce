name: state
in: query
required: false
description: |-
  Filter by entry state.
  * `current` - Only current (non-archived) entries.
  * `archived` - Only archived entries.
  * `all` - Include both current and archived entries.
  * `only` - Equivalent to `archived`.
  * `none` - Exclude all entries.
schema:
  type: string
  enum:
    - current
    - archived
    - all
    - only
    - none