title: Leaderboard list
description: |-
  Paginated leaderboard for a single score set.

  Wraps the ranked entries in `data` with the score set and season they belong to, alongside the standard pagination envelope.
allOf:
  - $ref: ./Pagination.yaml
  - type: object
    properties:
      data:
        type: array
        description: Leaderboard rows for the current page.
        items:
          $ref: ./Leaderboard.yaml
      score_set:
        type: object
        description: Score set the leaderboard is calculated for.
        properties:
          slug:
            type: string
            description: Short URL-safe identifier for the score set.
          name:
            type: object
            description: |-
              Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
            additionalProperties:
              type: string
          mode:
            type: string
            enum:
              - voting
              - qualifying
              - vip_judging
              - top_pick
            description: |-
              Scoring mode of the score set.

              Determines the shape of each row's `scores` object.
          form:
            type: object
            description: Form the score set scores entries from.
            properties:
              slug:
                type: string
                description: Short URL-safe identifier for the form.
              link:
                type: string
                format: uri
                description: Canonical URL for the form resource.
              name:
                type: object
                description: |-
                  Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
                additionalProperties:
                  type: string
      season:
        type: object
        description: Season the leaderboard belongs to.
        properties:
          slug:
            type: string
            description: Short URL-safe identifier for the season.
          link:
            type: string
            format: uri
            description: Canonical URL for the season resource.
          name:
            type: object
            description: |-
              Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
            additionalProperties:
              type: string
