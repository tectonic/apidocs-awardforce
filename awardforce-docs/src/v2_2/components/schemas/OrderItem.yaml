title: Order item
description: |-
  Single line item belonging to an order, combining the line item's own details with a snapshot of the parent order's billing, payment, and transaction information.
type: object
properties:
  address:
    type: string
    description: Billing street address supplied for the order.
  category:
    type: object
    nullable: true
    description: |-
      Category the line item's entry belongs to.

      `null` for line items that are not associated with an entry.
    properties:
      slug:
        type: string
        description: Short URL-safe identifier for the category.
      link:
        type: string
        format: uri
        description: Canonical URL for the category resource.
      name:
        type: object
        description: |-
          Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
  chapter:
    type: object
    nullable: true
    description: |-
      Chapter the line item's entry belongs to.

      `null` for line items that are not associated with an entry.
    properties:
      slug:
        type: string
        description: Short URL-safe identifier for the chapter.
      link:
        type: string
        format: uri
        description: Canonical URL for the chapter resource.
      name:
        type: object
        description: |-
          Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
  city:
    type: string
    description: Billing city supplied for the order.
  company:
    type: string
    description: Billing company name supplied for the order.
  country:
    type: string
    description: Billing country supplied for the order.
  created_at:
    type: string
    format: date-time
    description: Date and time the order was created, in ISO 8601 format.
  currency:
    type: string
    description: Currency the order amounts are denominated in, as an ISO 4217 code.
  description:
    type: string
    description: Human-readable description of the line item.
  discount:
    type: number
    description: Discount applied to the line item, in the order currency.
  discount_code:
    type: string
    description: |-
      Discount code applied to the order.

      Empty string when no code was applied.
  entry_name:
    type: string
    description: |-
      Title of the entry the line item relates to.

      Empty string for line items that are not associated with an entry.
  entry_slug:
    type: string
    description: |-
      Short URL-safe identifier for the entry the line item relates to.

      Empty string for line items that are not associated with an entry.
  invoice_number:
    type: string
    description: Invoice number assigned to the order.
  ip_address:
    type: string
    format: ip-address
    description: IP address the order was placed from.
  member_number:
    type: string
    description: Membership number recorded against the order.
  parent_category:
    type: object
    nullable: true
    description: |-
      Parent of the line item's category.

      `null` when the category has no parent or the line item is not associated with an entry.
    properties:
      slug:
        type: string
        description: Short URL-safe identifier for the parent category.
      link:
        type: string
        format: uri
        description: Canonical URL for the parent category resource.
      name:
        type: object
        description: |-
          Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
  payment_method:
    type: string
    description: Method used to pay for the order.
  payment_status:
    type: string
    description: Payment status of the order.
  postcode:
    type: string
    description: Billing postcode supplied for the order.
  price:
    type: string
    description: Name of the price the line item was charged at.
  region:
    type: string
    description: Billing region supplied for the order.
  season:
    type: object
    nullable: true
    description: |-
      Season the line item's entry belongs to.

      `null` for line items that are not associated with an entry.
    properties:
      slug:
        type: string
        description: Short URL-safe identifier for the season.
      link:
        type: string
        format: uri
        description: Canonical URL for the season resource.
      name:
        type: object
        description: |-
          Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
  slug:
    type: string
    description: Short URL-safe identifier for the order.
  state:
    type: string
    description: Billing state supplied for the order.
  subtotal:
    type: number
    description: Line item subtotal before tax and fees, in the order currency.
  tax_term:
    type: string
    description: Display term used for tax on the order, such as `VAT` or `GST`.
  transaction_date:
    type: string
    format: date-time
    nullable: true
    description: |-
      Date and time of the payment transaction, in ISO 8601 format.

      `null` when the order has no recorded payment transaction.
  transaction_provider:
    type: string
    description: Payment provider that processed the transaction.
  transaction_reference:
    type: string
    description: Reference assigned to the transaction by the payment provider.
  transaction_status:
    type: string
    description: Status of the payment transaction.
  type:
    type: string
    enum:
      - Entry
      - Entrant
      - Tag
      - Ticket
    description: Type of the line item.
  user:
    type: object
    description: User who placed the order.
    properties:
      slug:
        type: string
        description: Short URL-safe identifier for the user.
      link:
        type: string
        format: uri
        description: Canonical URL for the user resource.
      name:
        type: string
        description: Display name of the user.
      first_name:
        type: string
        description: First name of the user.
      last_name:
        type: string
        description: Last name of the user.
      email:
        type: string
        format: email
        description: Email address of the user.
  vat_number:
    type: string
    description: VAT number supplied for the order.
