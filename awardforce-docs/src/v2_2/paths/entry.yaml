get:
  summary: Retrieve entries
  operationId: GetEntryCollectionV22
  tags:
    - Entry
  parameters:
    - name: title
      in: query
      required: false
      description: Full or partial name of the entry
      schema:
        type: string
    - name: category
      in: query
      required: false
      description: Category slug
      schema:
        type: string
    - name: chapter
      in: query
      required: false
      description: Chapter slug
      schema:
        type: string
    - name: status
      in: query
      required: false
      description: |-
        - submitted
        - in_progress
        - resubmission_required
        - resubmitted
      schema:
        type: string
    - name: payment_status
      in: query
      required: false
      description: |-
        Status of the order. Possible values:
        paid
        awaiting_payment
      schema:
        type: string
    - name: price
      in: query
      required: false
      description: Price slug
      schema:
        type: string
    - name: review_status
      in: query
      required: false
      description: All available review statuses in the program
      schema:
        type: string
    - name: moderation
      in: query
      required: false
      description: |-
        - approved
        - undecided
        - rejected
      schema:
        type: string
    - name: season
      in: query
      required: false
      description: |-
        - Season slug
        - "all" to show all seasons
      schema:
        type: string
    - name: form
      in: query
      required: false
      description: Form slug
      schema:
        type: string
    - name: tag
      in: query
      required: false
      description: All available tags in the program
      schema:
        type: string
    - name: entrant
      in: query
      required: false
      description: Entrant slug
      schema:
        type: string
    - name: deleted
      in: query
      required: false
      description: |-
        - only (show only deleted entries)
        - included (include deleted entries)
        - none (exclude deleted entries)
      schema:
        type: string
    - name: archived
      in: query
      required: false
      description: |-
        - only (show only archived entries)
        - all (include archived entries)
        - none (exclude archived entries)
      schema:
        type: string
    - $ref: ../components/parameters/perPage.yaml
    - $ref: ../components/parameters/page.yaml
    - name: order
      in: query
      required: false
      description: |-
        Column name to order by. The following options are available:
        - category (slug)
        - chapter (slug)
        - applicant (slug)
        - local_id
        - parent_category (slug)
        - title
        - updated
      schema:
        type: string
    - name: dir
      in: query
      required: false
      description: |-
        - asc
        - desc
      schema:
        type: string
    - name: updated_at
      in: query
      required: false
      description: |-
        - [before]=YYYY-MM-DDTHH:MM:SSZ
        - [after]=YYYY-MM-DDTHH:MM:SSZ
        - [on]=YYYY-MM-DDTHH:MM:SSZ
        - [between]=[YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ]
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Entries retrieved.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Set-Cookie:
          $ref: ../components/headers/Set-Cookie.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EntryList.yaml
  description: Retrieves entries.
post:
  summary: Create an entry
  operationId: PostEntryV22
  tags:
    - Entry
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Entry created.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Location:
          $ref: ../components/headers/Location.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EntryCreateResult.yaml
  requestBody:
    $ref: ../components/requestBodies/EntryCreate.yaml
  description: Creates an entry.
