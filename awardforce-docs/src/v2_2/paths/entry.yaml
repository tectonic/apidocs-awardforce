get:
  summary: Retrieve entries
  operationId: GetEntryCollectionV22
  tags:
    - Entry
  parameters:
    - $ref: ../components/parameters/entryTitleFilter.yaml
    - $ref: ../components/parameters/categoryFilter.yaml
    - $ref: ../components/parameters/chapterFilter.yaml
    - $ref: ../components/parameters/entryStatusFilter.yaml
    - $ref: ../components/parameters/entryPaymentStatusFilter.yaml
    - $ref: ../components/parameters/entryPriceFilter.yaml
    - $ref: ../components/parameters/entryReviewStatusFilter.yaml
    - $ref: ../components/parameters/entryModerationFilter.yaml
    - $ref: ../components/parameters/seasonFilter.yaml
    - $ref: ../components/parameters/formFilter.yaml
    - $ref: ../components/parameters/tagFilter.yaml
    - $ref: ../components/parameters/entryEntrantFilter.yaml
    - $ref: ../components/parameters/deletedFilter.yaml
    - $ref: ../components/parameters/archivedFilter.yaml
    - $ref: ../components/parameters/perPage.yaml
    - $ref: ../components/parameters/page.yaml
    - $ref: ../components/parameters/entryOrder.yaml
    - $ref: ../components/parameters/sortDirection.yaml
    - $ref: ../components/parameters/entryUpdatedAtFilter.yaml
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Entries retrieved.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Set-Cookie:
          $ref: ../components/headers/Set-Cookie.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EntryList.yaml
  description: Retrieves entries.
post:
  summary: Create an entry
  operationId: PostEntryV22
  tags:
    - Entry
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Entry created.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Location:
          $ref: ../components/headers/Location.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EntryCreateResult.yaml
  requestBody:
    $ref: ../components/requestBodies/EntryCreate.yaml
  description: Creates an entry.
