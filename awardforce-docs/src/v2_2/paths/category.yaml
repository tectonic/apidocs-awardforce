get:
  summary: Retrieve categories
  operationId: GetCategoryCollectionV22
  tags:
    - Category
  parameters:
    - $ref: ../components/parameters/activeInactiveStatusFilter.yaml
    - $ref: ../components/parameters/chapterFilter.yaml
    - $ref: ../components/parameters/formFilter.yaml
    - $ref: ../components/parameters/parentCategoryFilter.yaml
    - $ref: ../components/parameters/seasonFilter.yaml
    - $ref: ../components/parameters/deletedFilter.yaml
    - $ref: ../components/parameters/page.yaml
    - $ref: ../components/parameters/perPage.yaml
    - $ref: ../components/parameters/categoryOrder.yaml
    - $ref: ../components/parameters/sortDirection.yaml
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Categories retrieved.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CategoryList.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Retrieves categories.
post:
  summary: Create a category
  operationId: PostCategoryV22
  tags:
    - Category
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  requestBody:
    $ref: ../components/requestBodies/CategoryCreate.yaml
  responses:
    '201':
      description: Category created.
      headers:
        Location:
          $ref: ../components/headers/Location.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Category.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Creates a category.
