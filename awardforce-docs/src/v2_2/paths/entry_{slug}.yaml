parameters:
  - name: slug
    in: path
    required: true
    description: Entry slug
    schema:
      type: string
get:
  summary: Get entry
  tags:
    - Entry
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Get entry
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              entrant:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: string
                  first_name:
                    type: string
                  last_name:
                    type: string
                  email:
                    type: string
                    format: email
                  global_id:
                    type: string
              entry_fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
                    translated:
                      type: object
                      properties:
                        en_GB:
                          type: string
              attachments:
                type: array
                items:
                  type: object
                  properties:
                    token:
                      type: string
                    link:
                      type: string
                      format: uri
                    file:
                      type: object
                      properties:
                        token:
                          type: string
                          format: utc-millisec
                        link:
                          type: string
                          format: uri
                        filename:
                          type: string
                        download:
                          type: string
                          format: uri
                    attachment_fields:
                      type: array
                      items: {}
                    tab:
                      type: object
                      properties:
                        slug:
                          type: string
                        type:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
              auto_score:
                type: integer
              category:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              chapter:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              comments:
                type: string
              contributor_count:
                type: integer
              contributors:
                type: array
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      slug:
                        type: string
                      link:
                        type: string
                        format: uri
                      label:
                        type: object
                        properties:
                          en_GB:
                            type: string
                      value:
                        type: string
                      translated:
                        type: object
                        properties:
                          en_GB:
                            type: string
              created:
                type: string
                format: date-time
              custom_deadline:
                type: string
              division:
                nullable: true
              eligibility_status:
                type: string
              files_count:
                type: integer
              form:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              local_id:
                type: integer
              moderation_status:
                type: string
              parent_category:
                nullable: true
              payment_status:
                type: string
              plagiarism_scan_status:
                type: string
              review_status:
                type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                        format: utc-millisec
              slug:
                type: string
              status:
                type: string
              submitted:
                nullable: true
              tags:
                type: string
              title:
                type: string
              updated:
                type: string
                format: date-time
              user_comments:
                type: string
  description: >-
    Returns an entry by its slug or its title.


    The response consists of all entry fields including files, attachments and
    contributors. Files include a download link.
put:
  summary: Update entry
  tags:
    - Entry
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Update entry
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              attachments:
                type: array
                items:
                  type: object
                  properties:
                    token:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: string
                    download:
                      type: string
                    attachment_fields:
                      type: array
                      items:
                        type: object
                        properties:
                          slug:
                            type: string
                          link:
                            type: string
                            format: uri
                          label:
                            type: object
                            properties:
                              en_GB:
                                type: string
                          value:
                            type: string
                          translated:
                            type: object
                            properties:
                              en_GB:
                                type: string
              category:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              chapter:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              comments:
                type: string
              contributor_count:
                type: integer
              contributors:
                type: array
                items: {}
              custom_deadline:
                type: string
                format: style
              created:
                type: string
                format: date-time
              division:
                nullable: true
              entrant:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: string
                  first_name:
                    type: string
                  last_name:
                    type: string
              entry_fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
                    translated:
                      type: object
                      properties:
                        en_GB:
                          type: string
              files_count:
                type: integer
              form:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              local_id:
                type: integer
              moderation_status:
                type: string
              parent_category:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              payment_status:
                type: string
              plagiarism_scan_status:
                type: string
              resubmitted:
                type: string
                format: date-time
              review_status:
                type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              slug:
                type: string
              status:
                type: string
              submitted:
                type: string
                format: date-time
              tags:
                type: string
              title:
                type: string
              updated:
                type: string
                format: date-time
  description: >-
    Update an existing entry.


    | Parameter | Required | Type | Description |

    | --- | --- | --- | --- |

    | category | No | String | Category slug |

    | chapter | No | String | Chapter slug |

    | entrant | No | String | Entrant slug |

    | title | No | String | Entry title |

    | status | No | String | One of the following values:<br><br>-
    submitted<br>    <br><br>- in_progress<br>    <br><br>-
    resubmission_required<br>    <br><br>- resubmitted |

    | moderation_status | No | String | One of the following values:<br><br>-
    approved<br>    <br><br>- undecided<br>    <br><br>- rejected |

    | entry_fields | No | Object | Object containing key / value pairs. Where
    the key is the Field slug.  <br>e.g. "fJkIjGmB": "Test value" |

    | custom_deadline | No | Date | Date with format yyyy-mm-dd hh:mm |
