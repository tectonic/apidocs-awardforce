parameters:
  - $ref: ../components/parameters/token.yaml
get:
  summary: Retrieve an attachment
  operationId: GetAttachmentV22
  tags:
    - Attachment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Attachment retrieved.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Attachment.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
  description: |-
    Retrieves the attachment identified by the specified token.

    The response carries the full attachment representation, including the parent entry, the attachments tab, the form fields captured against the attachment, and the underlying file together with a time-limited download URL.
put:
  summary: Update an attachment
  operationId: PutAttachmentV22
  tags:
    - Attachment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Attachment updated.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Attachment.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
  description: |-
    Updates an existing attachment.

    Every property in the request body is optional; only properties that are supplied are written. Properties that are omitted retain their current value.

    On success the response carries the post-update attachment representation, so a separate `GET` is not required to read the new state.
  x-mint:
    content: |-
      <Note>
      Attachment fields are linked to the attachment and are distinct from form fields.

      If the attachment has no attachment fields, you can omit `attachment_fields` from the request body.
      </Note>
  requestBody:
    $ref: ../components/requestBodies/AttachmentUpdate.yaml
delete:
  summary: Delete an attachment
  operationId: DeleteAttachmentV22
  tags:
    - Attachment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '204':
      description: Attachment deleted.
      headers:
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
  description: |-
    Deletes the attachment identified by the specified token.

    Removes the attachment from its parent entry. The change is durable before the response is returned.
