get:
  summary: Get category
  tags:
    - Category
  parameters:
    - name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
  responses:
    '200':
      description: Get category
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Vary:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              chapters:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
              created:
                type: string
                format: date-time
              description:
                type: object
                properties:
                  en_GB:
                    type: string
              divisions:
                type: integer
              entrant_max_entries:
                type: integer
              entry_name_label:
                type: object
                properties:
                  en_GB:
                    type: string
              fill_entry_name:
                type: boolean
              form:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              image_heading:
                type: object
                properties:
                  en_GB:
                    type: string
              images:
                type: array
                items:
                  type: object
                  properties:
                    token:
                      type: string
                    link:
                      type: string
                      format: uri
                    filename:
                      type: string
                    download:
                      type: string
              max_image_width:
                type: integer
              name:
                type: object
                properties:
                  en_GB:
                    type: string
              packing_slip_instructions:
                type: object
                properties:
                  en_GB:
                    type: string
              parent:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              pdf_packing_slip:
                type: boolean
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              shortcode:
                type: object
                properties:
                  en_GB:
                    type: string
                    format: color
              slug:
                type: string
              status:
                type: string
              updated:
                type: string
                format: date-time
  description: >-
    Returns a category by its slug. The response consists of all category
    fields. Images include a download link.
parameters:
  - name: slug
    in: path
    required: true
    description: Category slug
    schema:
      type: string
put:
  summary: Update category
  tags:
    - Category
  parameters:
    - name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
  responses:
    '200':
      description: Update category
      headers:
        Date:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              chapters:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
              created:
                type: string
                format: date-time
              description:
                type: object
                properties:
                  en_GB:
                    type: string
              divisions:
                type: integer
              entrant_max_entries:
                type: integer
              entry_name_label:
                type: object
                properties:
                  en_GB:
                    type: string
              fill_entry_name:
                type: boolean
              form:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              image_heading:
                type: object
                properties:
                  en_GB:
                    type: string
              images:
                type: array
                items:
                  type: object
                  properties:
                    token:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: string
                    download:
                      type: string
              max_image_width:
                type: integer
              name:
                type: object
                properties:
                  en_GB:
                    type: string
              packing_slip_instructions:
                type: object
                properties:
                  en_GB:
                    type: string
              parent:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              pdf_packing_slip:
                type: boolean
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              shortcode:
                type: object
                properties:
                  en_GB:
                    type: string
                    format: color
              slug:
                type: string
              status:
                type: string
              updated:
                type: string
                format: date-time
  description: >-
    Update an existing category.


    | Parameter | Required | Type | Description |

    | --------- | -------- | ---- | ----------- |

    | season | No | String | Season slug |

    | status | No | String | One of the following values: <ul> <li>active</li>
    <li>inactive</li> </ul> |

    | translated | No| Array | Array of key / value pairs where keys can be any
    of the following: <ul> <li>name</li> <li>description</li>
    <li>entry_name_label</li> <li>image_heading</li> 
    <li>packing_slip_instructions</li> <li>shortcode</li> </ul> Values are
    themselves of type Array containing key / value pairs where the key can be
    any existing and enabled language code. |

    | chapters | No | Array | Array of Chapter slugs |

    | divisions | No | Integer | Number of divisions |

    | entrant_max_entries | No | Integer | Number of max entries per Entrant |

    | fill_entry_name | No | Boolean | Determines whether to prefill the entry
    name field on the entry from when that category is selected. |

    | max_image_width | No | Integer | Maximum image width |

    | parent | No | String | Parent Category slug |

    | pdf_packing_slip | No | Boolean | Determines whether or not to generate a
    PDF packing slip |
