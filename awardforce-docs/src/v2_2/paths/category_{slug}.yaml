parameters:
  - name: slug
    in: path
    required: true
    description: Slug of the category.
    schema:
      type: string
get:
  summary: Retrieve a category
  operationId: GetCategoryV22
  tags:
    - Category
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Category retrieved.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Category.yaml
  description: |-
    Retrieves a category identified by the specified slug.
    The response includes all category fields.
    Images include a download link.
put:
  summary: Update a category
  operationId: PutCategoryV22
  tags:
    - Category
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Category updated.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Category.yaml
  description: |-
    Updates an existing category.


    | Parameter | Required | Type | Description |

    | --------- | -------- | ---- | ----------- |

    | season | No | String | Slug of the season. |

    | status | No | String | One of the following values: <ul> <li>active</li>
    <li>inactive</li> </ul> |

    | translated | No| Array | Array of key / value pairs where keys can be any
    of the following: <ul> <li>name</li> <li>description</li>
    <li>entry_name_label</li> <li>image_heading</li> 
    <li>packing_slip_instructions</li> <li>shortcode</li> </ul> Values are
    themselves of type Array containing key / value pairs where the key can be
    any existing and enabled language code. |

    | chapters | No | Array | Array of chapter slugs. |

    | divisions | No | Integer | Number of divisions. |

    | entrant_max_entries | No | Integer | Maximum number of entries per entrant. |

    | fill_entry_name | No | Boolean | Specifies whether to prefill the entry
    name when the category is selected. |

    | max_image_width | No | Integer | Maximum image width. |

    | parent | No | String | Slug of the parent category. |

    | pdf_packing_slip | No | Boolean | Specifies whether to generate a PDF
    packing slip. |
delete:
  summary: Delete a category
  operationId: DeleteCategoryV22
  tags:
    - Category
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '204':
      description: Category deleted.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
  description: Deletes an existing category.
