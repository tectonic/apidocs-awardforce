get:
  summary: Get season
  tags:
    - Season
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Get season
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Vary:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              created:
                type: string
                format: date-time
              name:
                type: object
                properties:
                  en_GB:
                    type: string
                    format: utc-millisec
              slug:
                type: string
              status:
                type: string
              updated:
                type: string
                format: date-time
  description: Returns a season by its slug. The response consists of all season fields.
parameters:
  - name: slug
    in: path
    required: true
    description: Season slug
    schema:
      type: string
