parameters:
  - $ref: ../components/parameters/allocationPaymentSlug.yaml
get:
  summary: Retrieve an allocation payment
  operationId: GetAllocationPaymentV22
  tags:
    - Allocation payment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Allocation payment retrieved.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AllocationPayment.yaml
        application/xml:
          schema:
            $ref: ../components/schemas/AllocationPayment.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Retrieves the allocation payment identified by the specified slug.
put:
  summary: Update an allocation payment
  operationId: PutAllocationPaymentV22
  tags:
    - Allocation payment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  requestBody:
    $ref: ../components/requestBodies/AllocationPaymentUpdate.yaml
  responses:
    '200':
      description: Allocation payment updated.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AllocationPayment.yaml
        application/xml:
          schema:
            $ref: ../components/schemas/AllocationPayment.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Updates the allocation payment identified by the specified slug.
