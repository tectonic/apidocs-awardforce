get:
  summary: List seasons
  tags:
    - Season
  parameters:
    - name: deleted
      in: query
      required: false
      description: |-
        - only (show only deleted categories)
        - included (include deleted categories)
        - none (exclude deleted categories)
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: string
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: string
    - name: order
      in: query
      required: false
      description: |-
        Column name to order by. The following options are available:
        - created
        - name
        - status
      schema:
        type: string
    - name: dir
      in: query
      required: false
      description: |-
        - asc
        - desc
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: List seasons
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Set-Cookie:
          $ref: ../components/headers/Set-Cookie.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              current_page:
                type: integer
              data:
                type: array
                items:
                  type: object
                  properties:
                    created:
                      type: string
                      format: date-time
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    slug:
                      type: string
                    status:
                      type: string
                    updated:
                      type: string
                      format: date-time
              first_page_url:
                type: string
                format: uri
              from:
                type: integer
              last_page:
                type: integer
              last_page_url:
                type: string
                format: uri
              next_page_url:
                type: string
              path:
                type: string
                format: uri
              per_page:
                type: integer
              prev_page_url:
                type: string
              to:
                type: integer
              total:
                type: integer
  description: Returns a list of seasons.
