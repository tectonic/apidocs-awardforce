get:
  summary: Get contributor
  tags:
    - Contributor
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Get contributor
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              entry:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  title:
                    type: string
              created:
                type: string
                format: date-time
              fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                        format: utc-millisec
              slug:
                type: string
              tab:
                type: array
                items: {}
              updated:
                type: string
                format: date-time
  description: >-
    Returns a contributor by its slug. The response consists of all contributor
    fields.
parameters:
  - name: slug
    in: path
    required: true
    description: Contributor slug
    schema:
      type: string
put:
  summary: Update contributor
  tags:
    - Contributor
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Update contributor
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              entry:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  title:
                    type: string
              created:
                type: string
                format: date-time
              fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                        format: utc-millisec
              slug:
                type: string
              tab:
                type: array
                items: {}
              updated:
                type: string
                format: date-time
  description: >-
    Update an existing contributor.


    | Parameter | Required | Type | Description |

    | --------- | -------- | ---- | ----------- |

    | fields | No| Object | Object containing key / value pairs. Where the key
    is the Field slug. e.g. "fJkIjGmB": "Test value" |
