                type: string
              comments:
                type: string
              company:
                type: string
                format: color
              country:
                type: string
              created_at:
                type: string
                format: date-time
              currency:
                type: string
              discount:
                type: integer
              discount_code:
                type: string
              invoice_number:
                type: string
              ip_address:
                type: string
                format: ip-address
              items:
                type: string
              member_number:
                type: string
                format: color
              payment_method:
                type: string
              payment_status:
                type: string
              postcode:
                type: string
                format: utc-millisec
              processing_fee:
                type: number
              processing_fee_rate:
                type: number
              region:
                type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              slug:
                type: string
              state:
                type: string
              subtotal:
                type: number
              tax:
                type: number
              tax_rate:
                type: integer
              tax_term:
                type: string
              total:
                type: number
              transaction_date:
                type: string
                format: date-time
              transaction_provider:
                type: string
              transaction_reference:
                type: string
              transaction_status:
                type: string
              user:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: string
                  first_name:
                    type: string
                  last_name:
                    type: string
                  email:
                    type: string
                    format: email
              vat_number:
                type: string
  description: >-
    Update the billing information and the status of an existing order.


    | Parameter | Required | Type | Description |

    | --------- | -------- | ---- | ----------- |

    | company | No| String | Billing information |

    | address | No | String | Billing information |

    | city | No | String | Billing information |

    | state | No | String | Billing information |

    | postcode | No | String | Billing information |

    | country | No | Two-letter country code | Billing information (see
    https://support.awardforce.com/hc/en-us/articles/360000237856-Two-letter-country-codes)
    |

    | payment_status | No | String | Status of the order. Possible values: <ul>
    <li>paid</li> <li>awaiting_payment</li> |

    | note | No | String | Annotation on the order |
  requestBody:
    content:
      application/json:
        schema:
          type: object
