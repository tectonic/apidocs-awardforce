post:
  summary: Comment on an allocation payment
  operationId: PostAllocationPaymentCommentV22
  tags:
    - Allocation payment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  requestBody:
    $ref: ../components/requestBodies/AllocationPaymentComment.yaml
  responses:
    '200':
      description: Comment added to the allocation payment.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AllocationPaymentCommentResult.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Adds a comment to the allocation payment identified by the slug in the request body.
