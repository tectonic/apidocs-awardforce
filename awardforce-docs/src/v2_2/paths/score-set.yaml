get:
  summary: List score sets
  tags:
    - Score set
  parameters:
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: integer
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: integer
    - name: form
      in: query
      required: false
      description: Form slug
      schema:
        type: string
    - name: season
      in: query
      required: false
      description: Season slug
      schema:
        type: string
    - name: mode
      in: query
      required: false
      description: |2-
         - qualifying
         - top_pick
         - vip_judging
         - voting
         - gallery
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: List scoresets
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Content-Length:
          $ref: ../components/headers/Content-Length.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        X-DataDome:
          $ref: ../components/headers/X-DataDome.yaml
        Accept-CH:
          $ref: ../components/headers/Accept-CH.yaml
        Set-Cookie:
          $ref: ../components/headers/Set-Cookie.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              current_page:
                type: integer
              data:
                type: array
                items:
                  type: object
                  properties:
                    created:
                      type: string
                      format: date-time
                    form:
                      type: string
                    mode:
                      type: string
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    order:
                      type: integer
                    season:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                              format: utc-millisec
                    slug:
                      type: string
                    updated:
                      type: string
                      format: date-time
              first_page_url:
                type: string
                format: uri
              from:
                type: integer
              last_page:
                type: integer
              last_page_url:
                type: string
                format: uri
              next_page_url:
                type: string
              path:
                type: string
                format: uri
              per_page:
                type: integer
              prev_page_url:
                type: string
              to:
                type: integer
              total:
                type: integer
  description: Returns a list of score sets.
