post:
  summary: Create review task
  operationId: PostReviewTaskV22
  tags:
    - Review task
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    default:
      description: Create review task
  requestBody:
    content:
      application/json:
        schema:
          type: object
get:
  summary: List review task
  operationId: GetReviewTaskCollectionV22
  tags:
    - Review task
  parameters:
    - name: action_at
      in: query
      required: false
      description: |-
        - [before]=YYYY-MM-DDTHH:MM:SSZ
        - [after]=YYYY-MM-DDTHH:MM:SSZ
        - [on]=YYYY-MM-DDTHH:MM:SSZ
        - [between]=[YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ]
      schema:
        type: string
    - name: created_at
      in: query
      required: false
      description: |-
        - [before]=YYYY-MM-DDTHH:MM:SSZ
        - [after]=YYYY-MM-DDTHH:MM:SSZ
        - [on]=YYYY-MM-DDTHH:MM:SSZ
        - [between]=[YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ]
      schema:
        type: string
    - name: decision
      in: query
      required: false
      description: Decision name
      schema:
        type: string
    - name: deleted
      in: query
      required: false
      description: |-
        - only (show only deleted review tasks)
        - included (include deleted review tasks)
        - none (exclude deleted review tasks)
      schema:
        type: string
    - $ref: ../components/parameters/page.yaml
    - $ref: ../components/parameters/perPage.yaml
    - name: review_stage
      in: query
      required: false
      description: Review stage slug
      schema:
        type: string
    - name: reviewer
      in: query
      required: false
      description: Reviewer name or email
      schema:
        type: string
    - name: season
      in: query
      required: false
      description: Season slug
      schema:
        type: string
    - name: updated_at
      in: query
      required: false
      description: |-
        - [before]=YYYY-MM-DDTHH:MM:SSZ
        - [after]=YYYY-MM-DDTHH:MM:SSZ
        - [on]=YYYY-MM-DDTHH:MM:SSZ
        - [between]=[YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ]
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
  responses:
    default:
      description: List review task
  requestBody:
    content:
      application/json:
        schema:
          type: object
