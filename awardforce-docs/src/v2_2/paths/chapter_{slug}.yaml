get:
  summary: Get chapter
  tags:
    - Chapter
  parameters:
    - name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
    - name: x-api-key
      in: header
      required: true
      description: Used for authentication and authorisation.
      schema:
        type: string
  responses:
    '200':
      description: Get chapter
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Vary:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              created:
                type: string
                format: date-time
              managers:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    first_name:
                      type: string
                    last_name:
                      type: string
              name:
                type: object
                properties:
                  en_GB:
                    type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                        format: utc-millisec
              slug:
                type: string
              status:
                type: string
              updated:
                type: string
                format: date-time
  description: Returns a chapter by its slug. The response consists of all chapter fields.
parameters:
  - name: slug
    in: path
    required: true
    description: Chapter slug
    schema:
      type: string
put:
  summary: Update chapter
  tags:
    - Chapter
  parameters:
    - name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
    - name: x-api-key
      in: header
      required: true
      description: Used for authentication and authorisation.
      schema:
        type: string
  responses:
    '200':
      description: Update chapter
      headers:
        Date:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              created:
                type: string
                format: date-time
              managers:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    first_name:
                      type: string
                    last_name:
                      type: string
              name:
                type: object
                properties:
                  en_GB:
                    type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                        format: utc-millisec
              slug:
                type: string
              status:
                type: string
              updated:
                type: string
                format: date-time
  description: >-
    Update an existing chapter.


    | Parameter | Required | Type | Description |

    | --------- | -------- | ---- | ----------- |

    | season | No | String | Season slug |

    | status | No | String | One of the following values: <ul> <li>active</li>
    <li>inactive</li> </ul> |

    | translated | No| Array | Array of key / value pairs where keys can be any
    of the following: <ul> <li>name</li> <li>image_heading</li> |

    | max_image_width | No | Integer | Maximum image width |

    | managers | No | Array fo slugs | Array of user slugs of chapter managers |
