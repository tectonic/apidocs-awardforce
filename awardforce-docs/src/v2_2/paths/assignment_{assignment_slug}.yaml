get:
  summary: Retrieve an assignment
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Assignment retrieved.
      headers:
        Server:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Vary:
          schema:
            type: string
        X-Powered-By:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Date:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Assignment.yaml
  description: Retrieves an assignment identified by the specified assignment slug.
parameters:
  - $ref: ../components/parameters/assignmentSlug.yaml
delete:
  summary: Delete an assignment
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '204':
      description: Assignment deleted.
      headers:
        Server:
          schema:
            type: string
        Connection:
          schema:
            type: string
        X-Powered-By:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Date:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
  description: Deletes an existing assignment.
