put:
  summary: Recuse assignment
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '204':
      description: Recuse assignment
      headers:
        Server:
          $ref: ../components/headers/Server.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        X-Powered-By:
          $ref: ../components/headers/X-Powered-By.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Date:
          $ref: ../components/headers/Date.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
      content:
        application/json:
          schema:
            type: object
  description: |-
    Recuse a judge from an existing assignment.

    | Parameter | Required | Type | Description |
    | --- | --- | --- | --- |
    | judge | Yes | String | Judge slug |
    | score_set | No | String | Score Set slug |
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            judge:
              type: string
            score_set:
              type: string
parameters:
  - name: slug
    in: path
    required: true
    schema:
      type: string
