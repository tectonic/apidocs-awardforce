get:
  summary: Retrieve assignments
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/page.yaml
    - $ref: ../components/parameters/perPage.yaml
    - name: status
      in: query
      required: false
      description: |-
        - none
        - in_progress
        - complete
        - abstained
      schema:
        type: string
    - name: score_set
      in: query
      required: false
      description: Score Set slug
      schema:
        type: string
    - name: panel
      in: query
      required: false
      description: Panel slug
      schema:
        type: string
    - name: tag
      in: query
      required: false
      description: Tag
      schema:
        type: string
    - name: season
      in: query
      required: false
      description: Season slug
      schema:
        type: string
    - name: method
      in: query
      required: false
      description: |-
        - automatic
        - manual
        - random
        - stray
      schema:
        type: string
    - name: judge
      in: query
      required: false
      description: Judge slug
      schema:
        type: string
    - name: state
      in: query
      required: false
      description: |-
        - undecided
        - approved
        - rejected
      schema:
        type: string
    - name: chapter
      in: query
      required: false
      description: Chapter slug
      schema:
        type: string
    - name: category
      in: query
      required: false
      description: Category slug
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Assignments retrieved.
      headers:
        Server:
          $ref: ../components/headers/Server.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        X-Powered-By:
          $ref: ../components/headers/X-Powered-By.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Date:
          $ref: ../components/headers/Date.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AssignmentList.yaml
  description: Retrieves assignments that match the specified filters.
post:
  summary: Create an assignment
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '202':
      description: Assignment creation accepted.
      headers:
        Server:
          $ref: ../components/headers/Server.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        X-Powered-By:
          $ref: ../components/headers/X-Powered-By.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Date:
          $ref: ../components/headers/Date.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
      content:
        application/json:
          schema:
            type: object
  description: |-
    Creates a new assignment.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - score_set
            - entries
            - judges
            - rounds
          properties:
            score_set:
              type: string
              description: Slug of the score set.
            entries:
              type: array
              description: List of entry slugs.
              items:
                type: string
            judges:
              type: array
              description: List of judge slugs.
              items:
                type: string
            rounds:
              type: array
              description: List of round slugs.
              items:
                type: string
