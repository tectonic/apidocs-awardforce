get:
  summary: Retrieve assignments
  tags:
    - Assignment
  parameters:
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: string
    - name: status
      in: query
      required: false
      description: |-
        - none
        - in_progress
        - complete
        - abstained
      schema:
        type: string
    - name: score_set
      in: query
      required: false
      description: Score Set slug
      schema:
        type: string
    - name: panel
      in: query
      required: false
      description: Panel slug
      schema:
        type: string
    - name: tag
      in: query
      required: false
      description: Tag
      schema:
        type: string
    - name: season
      in: query
      required: false
      description: Season slug
      schema:
        type: string
    - name: method
      in: query
      required: false
      description: |-
        - automatic
        - manual
        - random
        - stray
      schema:
        type: string
    - name: judge
      in: query
      required: false
      description: Judge slug
      schema:
        type: string
    - name: state
      in: query
      required: false
      description: |-
        - undecided
        - approved
        - rejected
      schema:
        type: string
    - name: chapter
      in: query
      required: false
      description: Chapter slug
      schema:
        type: string
    - name: category
      in: query
      required: false
      description: Category slug
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Assignments retrieved.
      headers:
        Server:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Vary:
          schema:
            type: string
        X-Powered-By:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Date:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AssignmentList.yaml
  description: Retrieves assignments that match the specified filters.
post:
  summary: Create an assignment
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '202':
      description: Assignment creation accepted.
      headers:
        Server:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        X-Powered-By:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Date:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
  description: |-
    Creates a new assignment.

    | Parameter | Required | Type | Description |
    | --- | --- | --- | --- |
    | score_set | Yes | String | Score Set slug |
    | entries | Yes | Array | List of Entry slugs |
    | judges | Yes | Array | List of Judge slugs |
    | rounds | Yes | Array | List of Round slugs |
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            score_set:
              type: string
            entries:
              type: array
              items:
                type: string
            judges:
              type: array
              items:
                type: string
            rounds:
              type: array
              items:
                type: string
