parameters:
  - $ref: ../components/parameters/userSlug.yaml
get:
  summary: Retrieve a user auth token
  operationId: GetUserAuthTokenV23
  tags:
    - User
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Auth token retrieved.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AuthToken.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Retrieves an SSO auth token for the specified user.
  x-mint:
    content: |-
      Use the token to log the user into the app using SSO.

      <Card
        title="Creating your own SSO integration"
        icon="key"
        href="https://support.awardforce.com/hc/en-us/articles/360002282716-Creating-your-own-SSO-integration"
      >
        Learn how to integrate Award Force with your own SSO provider.
      </Card>
