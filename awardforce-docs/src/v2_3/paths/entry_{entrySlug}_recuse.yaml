parameters:
  - $ref: ../components/parameters/entrySlug.yaml
put:
  summary: Recuse assignment
  operationId: PutEntryRecuseV23
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '204':
      description: Assignment recused.
      headers:
        Server:
          $ref: ../components/headers/Server.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        X-Powered-By:
          $ref: ../components/headers/X-Powered-By.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Date:
          $ref: ../components/headers/Date.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
  description: |-
    Recuses a judge from an existing assignment.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - judge
          properties:
            judge:
              type: string
              description: Slug of the judge.
            score_set:
              type: string
              description: Slug of the score set.
