parameters:
  - $ref: ../components/parameters/entryIdentifier.yaml
get:
  summary: Retrieve an entry
  operationId: GetEntryV23
  tags:
    - Entry
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Entry retrieved.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Entry.yaml
  description: Retrieves the entry identified by the specified slug or title.
put:
  summary: Update an entry
  operationId: PutEntryV23
  tags:
    - Entry
  parameters:
    - $ref: ../components/parameters/entrySlug.yaml
    - $ref: ../components/parameters/Accept.yaml
  requestBody:
    $ref: ../components/requestBodies/EntryUpdate.yaml
  responses:
    '200':
      description: Entry updated.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Entry.yaml
  description: Updates the entry identified by the specified slug.
delete:
  summary: Delete an entry
  operationId: DeleteEntryV23
  tags:
    - Entry
  parameters:
    - $ref: ../components/parameters/entrySlug.yaml
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '204':
      description: Entry deleted.
      headers:
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
  description: Deletes the entry identified by the specified slug.
