parameters:
  - name: slug
    in: path
    required: true
    description: Slug of the category.
    schema:
      type: string
get:
  summary: Retrieve a category
  operationId: GetCategoryV23
  tags:
    - Category
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Category retrieved.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Category.yaml
  description: Retrieves the category identified by the specified slug.
  x-mint:
    content: |-
      The response includes all category fields.
      Images include a download link.
put:
  summary: Update a category
  operationId: PutCategoryV23
  tags:
    - Category
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            season:
              type: string
              description: Slug of the season.
            status:
              type: string
              description: One of the following values.
              enum:
                - active
                - inactive
            translated:
              type: object
              description: Translated category field values keyed by field name.
              additionalProperties: false
              properties:
                name: &translatedField
                  type: object
                  description: Values keyed by existing and enabled language code.
                  additionalProperties:
                    type: string
                description: *translatedField
                entry_name_label: *translatedField
                image_heading: *translatedField
                packing_slip_instructions: *translatedField
                shortcode: *translatedField
            chapters:
              type: array
              description: Array of chapter slugs.
              items:
                type: string
            divisions:
              type: integer
              description: Number of divisions.
            entrant_max_entries:
              type: integer
              description: Maximum number of entries per entrant.
            fill_entry_name:
              type: boolean
              description: Specifies whether to prefill the entry name when the category is selected.
            max_image_width:
              type: integer
              description: Maximum image width.
            parent:
              type: string
              description: Slug of the parent category.
            pdf_packing_slip:
              type: boolean
              description: Specifies whether to generate a PDF packing slip.
  responses:
    '200':
      description: Category updated.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Category.yaml
  description: Updates the category identified by the specified slug.
delete:
  summary: Delete a category
  operationId: DeleteCategoryV23
  tags:
    - Category
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '204':
      description: Category deleted.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
  description: Deletes the category identified by the specified slug.
