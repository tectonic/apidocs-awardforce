get:
  summary: List users
  tags:
    - User
  parameters:
    - name: role
      in: query
      required: false
      description: Role slug
      schema:
        type: string
    - name: confirmation
      in: query
      required: false
      description: |-
        - confirmed
        - pending
      schema:
        type: string
    - name: season_joined
      in: query
      required: false
      description: Season slug
      schema:
        type: string
    - name: active_in_season
      in: query
      required: false
      description: Season slug
      schema:
        type: string
    - name: entries
      in: query
      required: false
      description: |-
        - current_season
        - none_current_season
        - archived_season
        - none
      schema:
        type: string
    - name: deleted
      in: query
      required: false
      description: |-
        - only (show only deleted users)
        - included (include deleted users)
        - none (exclude deleted users)
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: string
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: string
    - name: order
      in: query
      required: false
      description: |-
        Column name to order by. The following options are available:
        - confirmed_at
        - email
        - mobile
        - name
        - updated
      schema:
        type: string
    - name: dir
      in: query
      required: false
      description: |-
        - asc
        - desc
      schema:
        type: string
    - name: language
      in: query
      required: false
      description: Language code
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: List users
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Set-Cookie:
          schema:
            type: string
        Vary:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              current_page:
                type: integer
              data:
                type: array
                items:
                  type: object
                  properties:
                    analytics_cookies:
                      type: boolean
                    broadcast_emails:
                      type: boolean
                    confirmation:
                      type: string
                    confirmed_at:
                      type: string
                      format: date-time
                    created_at:
                      type: string
                      format: date-time
                    created_by:
                      type: string
                    email:
                      type: string
                      format: email
                    first_name:
                      type: string
                    language:
                      type: object
                      properties:
                        code:
                          type: string
                        language:
                          type: string
                    last_name:
                      type: string
                    marketing_cookies:
                      type: boolean
                    mobile:
                      type: string
                      format: utc-millisec
                    name:
                      type: string
                    necessary_cookies:
                      type: boolean
                    notification_emails:
                      type: boolean
                    notification_sms:
                      type: boolean
                    roles:
                      type: array
                      items:
                        type: object
                        properties:
                          slug:
                            type: string
                          link:
                            type: string
                            format: uri
                          name:
                            type: object
                            properties:
                              en_GB:
                                type: string
                    slug:
                      type: string
                    updated:
                      type: string
                      format: date-time
              first_page_url:
                type: string
                format: uri
              from:
                type: integer
              last_page:
                type: integer
              last_page_url:
                type: string
                format: uri
              next_page_url:
                type: string
              path:
                type: string
                format: uri
              per_page:
                type: integer
              prev_page_url:
                type: string
              to:
                type: integer
              total:
                type: integer
  description: Returns a list of users.
post:
  summary: Create user
  tags:
    - User
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Create user
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Location:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              analytics_cookies:
                type: boolean
              broadcast_emails:
                type: boolean
              confirmed_at:
                type: string
                format: date-time
              created_at:
                type: string
                format: date-time
              created_by:
                type: string
              email:
                type: string
                format: email
              first_name:
                type: string
              language:
                type: object
                properties:
                  code:
                    type: string
                  language:
                    type: string
              last_name:
                type: string
              marketing_cookies:
                type: boolean
              mobile:
                type: string
                format: utc-millisec
              name:
                type: string
              necessary_cookies:
                type: boolean
              notification_emails:
                type: boolean
              notification_sms:
                type: boolean
              preferences:
                type: object
                properties:
                  broadcast_emails:
                    type: boolean
                  notification_emails:
                    type: boolean
                  notification_sms:
                    type: boolean
              roles:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
              slug:
                type: string
              social_sharing:
                type: boolean
              updated:
                type: string
                format: date-time
              user_fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
                    translated:
                      type: object
                      properties:
                        en_GB:
                          type: string
  description: >-
    Create a new user.


    | Parameter | Required | Type | Description |

    | --------- | -------- | ---- | ----------- |

    | first_name | Yes | String | User's first name |

    | last_name | Yes | String | User's last name |

    | password | Yes | String | Password for accessing the account |

    | email | Yes (if mobile is not set) | String | User's email address |

    | mobile | Yes (if email is not set) | String | User's mobile number |

    | roles | No | Array | Array of Role slugs  |

    | preferences | No | Object | Object containing key / value pairs where keys
    can be any of the following: <ul> <li>broadcast_emails</li>
    <li>notification_emails</li> <li>notification_sms</li> </ul> Values are of
    type Boolean |

    | user_fields | No | Object | Object containing key / value pairs. Where the
    key is the Field slug. e.g. "fJkIjGmB": "Test value" |
