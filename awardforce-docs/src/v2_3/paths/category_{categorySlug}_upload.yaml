parameters:
  - $ref: ../components/parameters/categorySlug.yaml
post:
  summary: Upload a category file
  operationId: PostCategoryUploadV23
  tags:
    - Category
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Category file uploaded.
      headers:
        Location:
          $ref: ../components/headers/Location.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UploadResult.yaml
  description: Uploads a file for the category identified by the specified slug.
  x-mint:
    content: |-
      Use this operation to upload a category image.
