parameters:
  - name: slug
    in: path
    required: true
    description: Chapter slug
    schema:
      type: string
get:
  summary: Get chapter
  operationId: GetChapterV23
  tags:
    - Chapter
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Get chapter
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              created:
                type: string
                format: date-time
              managers:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    first_name:
                      type: string
                    last_name:
                      type: string
              name:
                type: object
                properties:
                  en_GB:
                    type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                        format: utc-millisec
              slug:
                type: string
              status:
                type: string
              updated:
                type: string
                format: date-time
  description: Returns a chapter by its slug. The response consists of all chapter fields.
put:
  summary: Update chapter
  operationId: PutChapterV23
  tags:
    - Chapter
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Update chapter
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              created:
                type: string
                format: date-time
              managers:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    first_name:
                      type: string
                    last_name:
                      type: string
              name:
                type: object
                properties:
                  en_GB:
                    type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                        format: utc-millisec
              slug:
                type: string
              status:
                type: string
              updated:
                type: string
                format: date-time
  description: >-
    Update an existing chapter.


    | Parameter | Required | Type | Description |

    | --------- | -------- | ---- | ----------- |

    | season | No | String | Season slug |

    | status | No | String | One of the following values: <ul> <li>active</li>
    <li>inactive</li> </ul> |

    | translated | No| Array | Array of key / value pairs where keys can be any
    of the following: <ul> <li>name</li> <li>image_heading</li> |

    | max_image_width | No | Integer | Maximum image width |

    | managers | No | Array fo slugs | Array of user slugs of chapter managers |
