              score_set:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                      pl_PL:
                        type: string
              slug:
                type: string
              status:
                type: string
              updated:
                type: string
                format: date-time
  description: Returns an assignment identified by it's slug.
parameters:
  - name: slug
    in: path
    required: true
    schema:
      type: string
delete:
  summary: Delete assignment
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - name: x-api-language
      in: header
      required: false
      description: Defines expected language.
      schema:
        type: string
  responses:
    '204':
      description: Delete assignment
      headers:
        Server:
          schema:
            type: string
        Connection:
          schema:
            type: string
        X-Powered-By:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Date:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
  description: Delete an existing assignment.
