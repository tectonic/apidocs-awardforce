                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                      pl_PL:
                        type: string
              comments:
                type: object
                properties:
                  judging:
                    type: array
                    items:
                      type: object
                      properties:
                        slug:
                          type: string
                        comment:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        user:
                          type: object
                          properties:
                            slug:
                              type: string
                            link:
                              type: string
                              format: uri
                            name:
                              type: string
                            first_name:
                              type: string
                            last_name:
                              type: string
                  abstention:
                    type: array
                    items:
                      type: object
                      properties:
                        slug:
                          type: string
                        comment:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        user:
                          type: object
                          properties:
                            slug:
                              type: string
                            link:
                              type: string
                              format: uri
                            name:
                              type: string
                            first_name:
                              type: string
                            last_name:
                              type: string
                  conflict:
                    type: array
                    items:
                      type: object
                      properties:
                        slug:
                          type: string
                        comment:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        user:
                          type: object
                          properties:
                            slug:
                              type: string
                            link:
                              type: string
                              format: uri
                            name:
                              type: string
                            first_name:
                              type: string
                            last_name:
                              type: string
                  criteria:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        comments:
                          type: array
                          items:
                            type: object
