get:
  summary: Retrieve allocations
  operationId: GetAllocationCollectionV23
  tags:
    - Allocation
  parameters:
    - $ref: ../components/parameters/trashedFilter.yaml
    - $ref: ../components/parameters/allocationOrder.yaml
    - $ref: ../components/parameters/sortDirection.yaml
    - $ref: ../components/parameters/page.yaml
    - $ref: ../components/parameters/perPage.yaml
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Allocations retrieved.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AllocationList.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Retrieves allocations.
post:
  summary: Create an allocation
  operationId: PostAllocationV23
  tags:
    - Allocation
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  requestBody:
    $ref: ../components/requestBodies/AllocationCreate.yaml
  responses:
    '201':
      description: Allocation created.
      headers:
        Location:
          $ref: ../components/headers/Location.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Allocation.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Creates an allocation.
