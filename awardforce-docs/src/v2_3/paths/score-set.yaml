get:
  summary: List score sets
  tags:
    - Score set
  parameters:
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: integer
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: integer
    - name: form
      in: query
      required: false
      description: Form slug
      schema:
        type: string
    - name: season
      in: query
      required: false
      description: Season slug
      schema:
        type: string
    - name: mode
      in: query
      required: false
      description: |2-
         - qualifying
         - top_pick
         - vip_judging
         - voting
         - gallery
      schema:
        type: string
    - name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
  responses:
    '200':
      description: List scoresets
      headers:
        Date:
          schema:
            type: string
        Content-Length:
          schema:
            type: integer
        Connection:
          schema:
            type: string
        X-DataDome:
          schema:
            type: string
        Accept-CH:
          schema:
            type: string
        Set-Cookie:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-Ratelimit-Limit:
          schema:
            type: integer
        X-Ratelimit-Remaining:
          schema:
            type: integer
        X-Ratelimit-Reset:
          schema:
            type: integer
        Etag:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              current_page:
                type: integer
              data:
                type: array
                items:
                  type: object
                  properties:
                    created:
                      type: string
                      format: date-time
                    form:
                      type: string
                    mode:
                      type: string
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    order:
                      type: integer
                    season:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                              format: utc-millisec
                    slug:
                      type: string
                    updated:
                      type: string
                      format: date-time
              first_page_url:
                type: string
                format: uri
              from:
                type: integer
              last_page:
                type: integer
              last_page_url:
                type: string
                format: uri
              next_page_url:
                type: string
              path:
                type: string
                format: uri
              per_page:
                type: integer
              prev_page_url:
                type: string
              to:
                type: integer
              total:
                type: integer
  description: Returns a list of score sets.
