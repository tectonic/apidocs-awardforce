parameters:
  - name: slug
    in: path
    required: true
    description: Order slug
    schema:
      type: string
get:
  summary: Get order
  tags:
    - Order
  parameters:
    - name: deleted
      in: query
      required: false
      schema:
        type: string
    - $ref: ../components/parameters/perPage.yaml
    - $ref: ../components/parameters/page.yaml
    - name: order
      in: query
      required: false
      schema:
        type: string
    - name: dir
      in: query
      required: false
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Get order
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              address:
                type: string
              city:
                type: string
              comments:
                type: string
              company:
                type: string
                format: color
              country:
                type: string
              created_at:
                type: string
                format: date-time
              currency:
                type: string
              discount:
                type: integer
              discount_code:
                type: string
              invoice_number:
                type: string
              ip_address:
                type: string
                format: ip-address
              items:
                type: string
              items_array:
                type: array
                items:
                  type: object
                  properties:
                    amount:
                      type: string
                      format: utc-millisec
                    description:
                      type: string
                      format: style
                    discount:
                      type: string
                      format: utc-millisec
                    entry:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        title:
                          type: string
                    item_type:
                      type: string
                    name:
                      type: string
                    price:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        title:
                          type: object
                          properties:
                            en_GB:
                              type: string
                    quantity:
                      type: integer
              member_number:
                type: string
                format: color
              payment_method:
                type: string
              payment_status:
                type: string
              postcode:
                type: string
                format: utc-millisec
              processing_fee:
                type: number
              processing_fee_rate:
                type: number
              region:
                type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              slug:
                type: string
              state:
                type: string
              subtotal:
                type: number
              tax:
                type: number
              tax_rate:
                type: integer
              tax_rate_details:
                type: object
                properties:
                  country:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: string
                  rate:
                    type: integer
                  region:
                    nullable: true
                  slug:
                    type: string
                  term:
                    type: string
              tax_term:
                type: string
              total:
                type: number
              transaction_date:
                type: string
                format: date-time
              transaction_provider:
                type: string
              transaction_reference:
                type: string
              transaction_status:
                type: string
              user:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: string
                  first_name:
                    type: string
                  last_name:
                    type: string
                  email:
                    type: string
                    format: email
              vat_number:
                type: string
  description: Returns an order by its slug.
put:
  summary: Update order
  tags:
    - Order
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Update order
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              address:
                type: string
              city:
                type: string
              comments:
                type: string
              company:
                type: string
                format: color
              country:
                type: string
              created_at:
                type: string
                format: date-time
              currency:
                type: string
              discount:
                type: integer
              discount_code:
                type: string
              invoice_number:
                type: string
              ip_address:
                type: string
                format: ip-address
              items:
                type: string
              member_number:
                type: string
                format: color
              payment_method:
                type: string
              payment_status:
                type: string
              postcode:
                type: string
                format: utc-millisec
              processing_fee:
                type: number
              processing_fee_rate:
                type: number
              region:
                type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              slug:
                type: string
              state:
                type: string
              subtotal:
                type: number
              tax:
                type: number
              tax_rate:
                type: integer
              tax_term:
                type: string
              total:
                type: number
              transaction_date:
                type: string
                format: date-time
              transaction_provider:
                type: string
              transaction_reference:
                type: string
              transaction_status:
                type: string
              user:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: string
                  first_name:
                    type: string
                  last_name:
                    type: string
                  email:
                    type: string
                    format: email
              vat_number:
                type: string
  description: >-
    Update the billing information and the status of an existing order.


    | Parameter | Required | Type | Description |

    | --------- | -------- | ---- | ----------- |

    | company | No| String | Billing information |

    | address | No | String | Billing information |

    | city | No | String | Billing information |

    | state | No | String | Billing information |

    | postcode | No | String | Billing information |

    | country | No | Two-letter country code | Billing information (see
    https://support.awardforce.com/hc/en-us/articles/360000237856-Two-letter-country-codes)
    |

    | payment_status | No | String | Status of the order. Possible values: <ul>
    <li>paid</li> <li>awaiting_payment</li> |

    | note | No | String | Annotation on the order |
  requestBody:
    content:
      application/json:
        schema:
          type: object
