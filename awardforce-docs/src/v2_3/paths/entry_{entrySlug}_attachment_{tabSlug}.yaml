parameters:
  - $ref: ../components/parameters/entrySlug.yaml
  - $ref: ../components/parameters/tabSlug.yaml
post:
  summary: Create an attachment
  operationId: PostEntryAttachmentV23
  tags:
    - Attachment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Attachment created.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Location:
          $ref: ../components/headers/Location.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              token:
                type: string
              link:
                type: string
                format: uri
              file:
                type: object
                properties:
                  filename:
                    type: string
                  token:
                    type: string
                  link:
                    type: string
                    format: uri
  description: Creates an attachment for the specified entry and tab.
  x-mint:
    content: |-
      <Note>
      Attachment fields are linked to the attachment and are distinct from form fields.

      If the attachment has no attachment fields, you can omit `attachment_fields` from the request body.
      </Note>
