parameters:
  - $ref: ../components/parameters/token.yaml
get:
  summary: Get attachment
  tags:
    - Attachment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Get attachment
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              entry:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  title:
                    type: string
              attachment_fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
                    translated:
                      type: object
                      properties:
                        en_GB:
                          type: string
              created:
                type: string
                format: date-time
              file:
                type: object
                properties:
                  token:
                    type: string
                  link:
                    type: string
                    format: uri
                  download:
                    type: string
                    format: uri
                  filename:
                    type: string
              order:
                type: integer
              tab:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              token:
                type: string
              updated:
                type: string
                format: date-time
  description: >-
    Returns an attachment by its token. The response consists of all attachment
    fields. Files include a download link.
  requestBody:
    content:
      application/json:
        schema:
          type: object
put:
  summary: Update attachment
  tags:
    - Attachment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Update attachment
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              entry:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  title:
                    type: string
              attachment_fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
                    translated:
                      type: object
                      properties:
                        en_GB:
                          type: string
              created:
                type: string
                format: date-time
              file:
                type: object
                properties:
                  token:
                    type: string
                  link:
                    type: string
                    format: uri
                  download:
                    type: string
                    format: uri
                  filename:
                    type: string
              order:
                type: integer
              tab:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              token:
                type: string
              updated:
                type: string
                format: date-time
  description: >-
    Update an existing attachment.  

    Please note that attachment fields are linked to the attachment and
    shouldn't be confused with form fields.  

    If you don't have attachment fields you can remove this object from the body
    of your request.


    | Parameter | Required | Type | Description |

    | --- | --- | --- | --- |

    | attachment_fields | No | array | Object containing key / value pairs.
    Where the key is the Field slug. e.g. "fJkIjGmB": "Test value" |

    | order | No | Integer | Attachment order |

    | tab | No | Array | Tab slug |
