post:
  summary: Create a review task
  operationId: PostReviewTaskV23
  tags:
    - Review task
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Review task created.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ReviewTask.yaml
        application/xml:
          schema:
            $ref: ../components/schemas/ReviewTask.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  requestBody:
    $ref: ../components/requestBodies/ReviewTaskCreate.yaml
  description: Creates a review task.
get:
  summary: Retrieve review tasks
  operationId: GetReviewTaskCollectionV23
  tags:
    - Review task
  parameters:
    - $ref: ../components/parameters/reviewTaskActionAtFilter.yaml
    - $ref: ../components/parameters/reviewTaskCreatedAtFilter.yaml
    - $ref: ../components/parameters/reviewTaskUpdatedAtFilter.yaml
    - $ref: ../components/parameters/decisionFilter.yaml
    - $ref: ../components/parameters/reviewStageFilter.yaml
    - $ref: ../components/parameters/reviewerFilter.yaml
    - $ref: ../components/parameters/seasonFilter.yaml
    - $ref: ../components/parameters/deletedFilter.yaml
    - $ref: ../components/parameters/page.yaml
    - $ref: ../components/parameters/perPage.yaml
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Review tasks retrieved.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ReviewTaskList.yaml
        application/xml:
          schema:
            $ref: ../components/schemas/ReviewTaskList.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Retrieves review tasks.
