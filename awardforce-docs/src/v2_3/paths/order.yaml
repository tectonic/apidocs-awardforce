get:
  summary: List orders
  tags:
    - Order
  parameters:
    - name: status
      in: query
      required: false
      description: |-
        - paid
        - awaiting_payment
      schema:
        type: string
    - name: test
      in: query
      required: false
      description: |-
        - only
        - hide
      schema:
        type: string
    - name: season
      in: query
      required: false
      description: Season slug
      schema:
        type: string
    - name: deleted
      in: query
      required: false
      description: |-
        - only (show only deleted categories)
        - included (include deleted categories)
        - none (exclude deleted categories)
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: string
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: string
    - name: order
      in: query
      required: false
      description: |-
        Column name to order by. The following options are available:
        - date
        - email
        - first_name
        - last_name
        - local_id
        - number
        - payment_method
        - payment_status
        - season
        - total
      schema:
        type: string
    - name: dir
      in: query
      required: false
      description: |-
        - asc
        - desc
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: List orders
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              current_page:
                type: integer
              data:
                type: array
                items:
                  type: object
                  properties:
                    address:
                      type: string
                    city:
                      type: string
                    comments:
                      type: string
                    company:
                      type: string
                      format: color
                    country:
                      type: string
                    created_at:
                      type: string
                      format: date-time
                    currency:
                      type: string
                    discount:
                      type: integer
                    discount_code:
                      type: string
                    invoice_number:
                      type: string
                    ip_address:
                      type: string
                      format: ip-address
                    items:
                      type: string
                    items_array:
                      type: array
                      items:
                        type: object
                        properties:
                          amount:
                            type: string
                            format: utc-millisec
                          description:
                            type: string
                            format: style
                          discount:
                            type: string
                            format: utc-millisec
                          entry:
                            type: object
                            properties:
                              slug:
                                type: string
                              link:
                                type: string
                                format: uri
                              title:
                                type: string
                          item_type:
                            type: string
                          name:
                            type: string
                          price:
                            type: object
                            properties:
                              slug:
                                type: string
                              link:
                                type: string
                                format: uri
                              title:
                                type: object
                                properties:
                                  en_GB:
                                    type: string
                          quantity:
                            type: integer
                    member_number:
                      type: string
                      format: color
                    payment_method:
                      type: string
                    payment_status:
                      type: string
                    postcode:
                      type: string
                      format: utc-millisec
                    processing_fee:
                      type: number
                    processing_fee_rate:
                      type: number
                    region:
                      type: string
                    season:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                    slug:
                      type: string
                    state:
                      type: string
                    subtotal:
                      type: number
                    tax:
                      type: number
                    tax_rate:
                      type: integer
                    tax_rate_details:
                      type: object
                      properties:
                        country:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: string
                        rate:
                          type: integer
                        region:
                          nullable: true
                        slug:
                          type: string
                        term:
                          type: string
                    tax_term:
                      type: string
                    total:
                      type: number
                    transaction_date:
                      type: string
                      format: date-time
                    transaction_provider:
                      type: string
                    transaction_reference:
                      type: string
                    transaction_status:
                      type: string
                    user:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: string
                        first_name:
                          type: string
                        last_name:
                          type: string
                        email:
                          type: string
                          format: email
                    vat_number:
                      type: string
              first_page_url:
                type: string
                format: uri
              from:
                type: integer
              last_page:
                type: integer
              last_page_url:
                type: string
                format: uri
              next_page_url:
                type: string
                format: uri
              path:
                type: string
                format: uri
              per_page:
                type: integer
              prev_page_url:
                type: string
              to:
                type: integer
              total:
                type: integer
  description: Returns a list of orders.
