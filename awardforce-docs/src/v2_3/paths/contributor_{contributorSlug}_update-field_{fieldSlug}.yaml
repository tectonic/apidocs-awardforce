parameters:
  - $ref: ../components/parameters/contributorSlug.yaml
  - $ref: ../components/parameters/fieldSlug.yaml
put:
  summary: Update a contributor field
  operationId: PutContributorUpdateFieldV23
  tags:
    - Entry (realtime)
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Contributor field updated.
      headers:
        Location:
          $ref: ../components/headers/Location.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Contributor.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Updates a contributor field for the contributor identified by the specified slug.
  requestBody:
    $ref: ../components/requestBodies/ContributorFieldUpdate.yaml
