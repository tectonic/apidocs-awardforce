parameters:
  - $ref: ../components/parameters/chapterSlug.yaml
post:
  summary: Upload a chapter file
  operationId: PostChapterUploadV23
  tags:
    - Chapter
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Chapter file uploaded.
      headers:
        Location:
          $ref: ../components/headers/Location.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UploadResult.yaml
        application/xml:
          schema:
            $ref: ../components/schemas/UploadResult.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Uploads a file for the chapter identified by the specified slug.
  requestBody:
    $ref: ../components/requestBodies/ChapterUpload.yaml
  x-mint:
    content: |-
      Use this operation to upload a chapter image.

      <Warning>
      The uploaded file is validated and stored before the response is returned; the image itself is processed shortly after. A `GET` on the returned `Location` immediately after the `201` may briefly return a response with a `null` body until processing is complete.
      </Warning>
