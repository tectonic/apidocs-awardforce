get:
  summary: List chapters
  tags:
    - Chapter
  parameters:
    - name: status
      in: query
      required: false
      description: |-
        - active
        - inactive
      schema:
        type: string
    - name: season
      in: query
      required: false
      description: |-
        - season slug
        - "all" to show all seasons
      schema:
        type: string
    - name: deleted
      in: query
      required: false
      description: |-
        - only (show only deleted categories)
        - included (include deleted categories)
        - none (exclude deleted categories)
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: string
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: string
    - name: order
      in: query
      required: false
      description: |-
        Column name to order by. The following options are available:
        - chapter_count
        - divisions
        - entry_count
        - name
        - parent (slug)
        - season (slug)
        - shortcode
        - status
        - updated
      schema:
        type: string
    - name: dir
      in: query
      required: false
      description: |-
        - asc
        - desc
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
    - name: x-api-language
      in: header
      required: false
      description: Defines the languages to include in the response.
      schema:
        type: string
  responses:
    '200':
      description: List chapters
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Set-Cookie:
          schema:
            type: string
        Vary:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              current_page:
                type: integer
              data:
                type: array
                items:
                  type: object
                  properties:
                    created:
                      type: string
                      format: date-time
                    managers:
                      type: array
                      items:
                        type: object
                        properties:
                          slug:
                            type: string
                          link:
                            type: string
                            format: uri
                          first_name:
                            type: string
                          last_name:
                            type: string
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    season:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                              format: utc-millisec
                    slug:
                      type: string
                    status:
                      type: string
                    updated:
                      type: string
                      format: date-time
              first_page_url:
                type: string
                format: uri
              from:
                type: integer
              last_page:
                type: integer
              last_page_url:
                type: string
                format: uri
              next_page_url:
                type: string
              path:
                type: string
                format: uri
              per_page:
                type: integer
              prev_page_url:
                type: string
              to:
                type: integer
              total:
                type: integer
  description: Returns a list of chapters.
post:
  summary: Create chapter
  tags:
    - Chapter
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Create chapter
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Location:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              created:
                type: string
                format: date-time
              managers:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    first_name:
                      type: string
                    last_name:
                      type: string
              name:
                type: object
                properties:
                  en_GB:
                    type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                        format: utc-millisec
              slug:
                type: string
              status:
                type: string
              updated:
                type: string
                format: date-time
  description: >-
    Create a new chapter.


    | Parameter | Required | Type | Description |

    | --- | --- | --- | --- |

    | season | Yes | String | Season slug |

    | status | Yes | String | One of the following values:<br><br>-
    active<br>    <br><br>- inactive |

    | translated | No | Array | Array of key / value pairs where keys can be any
    of the following:<br><br>- name<br>    <br><br>- image_heading |

    | max_image_width | No | Integer | Maximum image width |

    | managers | No | Array fo slugs | Array of user slugs of chapter managers |
