name: order
in: query
required: false
description: |-
  Sort by a supported chapter field.
  * `parent` - Sort by parent slug.
  * `season` - Sort by season slug.
schema:
  type: string
  enum:
    - chapter_count
    - divisions
    - entry_count
    - name
    - parent
    - season
    - shortcode
    - status
    - updated
