allOf:
  - $ref: ./BaseProblem.yaml
  - type: object
    properties:
      status_code:
        type: integer
        minimum: 422
        maximum: 422
      errors:
        type: object
        description: |-
          Map of request field to the list of validation messages for that field. Present only on field-level validation failures; omitted when the 422 was raised by a resource-state precondition.
        additionalProperties:
          type: array
          items:
            type: string
