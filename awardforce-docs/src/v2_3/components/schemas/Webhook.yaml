type: object
properties:
  events:
    type: array
    description: Subscription events that trigger this webhook.
    items:
      type: string
  fields:
    type: array
    description: Fields included in the webhook payload.
    items:
      type: object
      properties:
        slug:
          type: string
          description: Short URL-safe identifier for the field.
        link:
          type: string
          format: uri
          description: Canonical URL for the field resource.
        title:
          type: object
          description: |-
            Plain-text title of the field.

            Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
          additionalProperties:
            type: string
  form:
    type: string
    nullable: true
    description: Slug of the form the webhook is scoped to. `null` when the webhook is not scoped to a specific form.
  method:
    type: string
    description: HTTP method used to call the webhook URL.
    enum:
      - get
      - post
  name:
    type: string
    description: Name of the webhook.
  slug:
    type: string
    description: Slug of the webhook.
  signing_key:
    type: string
    description: Key used to sign outgoing webhook requests so the receiver can validate the payload.
  url:
    type: string
    format: uri
    description: URL that receives the webhook payload.
  created:
    type: string
    format: date-time
    description: Date and time the webhook was created.
  updated:
    type: string
    format: date-time
    description: Date and time the webhook was last updated.
example:
  created: '2025-12-21T23:11:20Z'
  events:
    - entry_created
    - entry_submitted
  fields: []
  form: null
  method: post
  name: Entry notifications
  signing_key: REDACTED
  slug: AbCdEfGh
  updated: '2025-12-21T23:11:20Z'
  url: https://example.com/webhooks
