allOf:
  - $ref: ./Pagination.yaml
  - type: object
    properties:
      data:
        type: array
        items:
          type: object
          properties:
            entry:
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                title:
                  type: string
            category:
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                name:
                  type: object
                  description: |-
                    Map keyed by locale code (e.g. `en_GB`, `fr_FR`).
                    Keys are drawn from the languages enabled on the
                    account. Values are the translated string.
                  additionalProperties:
                    type: string
            chapter:
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                name:
                  type: object
                  description: |-
                    Map keyed by locale code (e.g. `en_GB`, `fr_FR`).
                    Keys are drawn from the languages enabled on the
                    account. Values are the translated string.
                  additionalProperties:
                    type: string
            comments:
              type: object
              nullable: true
              description: |-
                Comments attached to the assignment.

                `null` for role-based assignments (where `role` is
                populated and `reviewer` is absent), since role
                holders do not own per-assignment comment threads.
              properties:
                judging:
                  type: array
                  items: &commentItem
                    type: object
                    properties:
                      slug:
                        type: string
                      comment:
                        type: string
                        description: |-
                          Comment body as an HTML fragment.

                          May contain block-level tags such as
                          `<p>`. Empty string when the user saved
                          a comment with no content.
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                      user: &commentUser
                        type: object
                        properties:
                          slug:
                            type: string
                          link:
                            type: string
                            format: uri
                          name:
                            type: string
                          first_name:
                            type: string
                          last_name:
                            type: string
                abstention:
                  type: array
                  items: *commentItem
                conflict:
                  type: array
                  items: *commentItem
                criteria:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: |-
                          Display name of the criterion, rendered in
                          the account's default locale (single string,
                          not a locale map).
                      comments:
                        type: array
                        items:
                          type: object
                          properties:
                            slug:
                              type: string
                            comment:
                              type: string
                              description: |-
                                Comment body as an HTML fragment.

                                May contain block-level tags such as
                                `<p>`. Empty string when the user
                                saved a comment with no content.
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
                            user: *commentUser
            created:
              type: string
              format: date-time
            form:
              type: string
              description: Slug of the form attached to the entry.
            method:
              type: string
            panels:
              type: array
              items:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    description: |-
                      Map keyed by locale code (e.g. `en_GB`, `fr_FR`).
                      Keys are drawn from the languages enabled on the
                      account. Values are the translated string.
                    additionalProperties:
                      type: string
            judge:
              nullable: true
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                name:
                  type: string
            role:
              nullable: true
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                name:
                  type: object
                  description: |-
                    Map keyed by locale code (e.g. `en_GB`, `fr_FR`).
                    Keys are drawn from the languages enabled on the
                    account. Values are the translated string.
                  additionalProperties:
                    type: string
            rounds:
              type: array
              items:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    description: |-
                      Map keyed by locale code (e.g. `en_GB`, `fr_FR`).
                      Keys are drawn from the languages enabled on the
                      account. Values are the translated string.
                    additionalProperties:
                      type: string
            score:
              description: |-
                Score for this assignment, formatted per the score-set
                mode. `null` when no score has been recorded.

                Shape varies by score-set mode. Two confirmed shapes:

                Regular numeric or qualifying mode:

                ```json
                {
                  "criteria": [
                    {
                      "name": { "en_GB": "Originality" },
                      "value": 7,
                      "max_score": 10,
                      "final_score": "7/10",
                      "weight": 1
                    }
                  ],
                  "total_score": {
                    "value": 7,
                    "max_score": 10,
                    "final_score": "7/10"
                  }
                }
                ```

                Voting mode:

                ```json
                { "total_votes": 0 }
                ```

                VIP and top-pick modes follow their own conventions.
              nullable: true
            score_set:
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                name:
                  type: object
                  description: |-
                    Map keyed by locale code (e.g. `en_GB`, `fr_FR`).
                    Keys are drawn from the languages enabled on the
                    account. Values are the translated string.
                  additionalProperties:
                    type: string
            slug:
              type: string
            status:
              type: string
            updated:
              type: string
              format: date-time