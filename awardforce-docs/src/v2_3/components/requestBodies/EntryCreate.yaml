description: Entry creation payload.
content:
  application/json:
    schema:
      type: object
      additionalProperties: false
      required:
        - category
        - entrant
        - season
        - title
      properties:
        category:
          type: string
          description: Slug of the category.
        chapter:
          type: string
          description: Slug of the chapter. If omitted, defaults to the first chapter of the season.
        entrant:
          type: string
          description: Slug of the entrant.
        season:
          type: string
          description: Slug of the season.
        title:
          type: string
          description: Title of the entry.
        form:
          type: string
          description: Slug of the form.
        status:
          type: string
          description: Entry status.
          enum:
            - submitted
            - in_progress
            - resubmission_required
        moderation_status:
          type: string
          description: Moderation status of the entry.
          enum:
            - approved
            - undecided
            - rejected
        entry_fields:
          type: object
          description: Entry field values keyed by field slug. The value type depends on the field type.
          additionalProperties: {}
        custom_deadline:
          type: string
          description: Custom deadline in `yyyy-mm-dd hh:mm` format.
        grant_status:
          type: string
          description: Slug of the grant status. Available when the grants feature is enabled.
        grant_end_date:
          type: string
          format: date
          description: Date when the grant ends. Available when the grants feature is enabled.
required: true