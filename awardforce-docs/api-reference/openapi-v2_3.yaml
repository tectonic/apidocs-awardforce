    Category:
      title: Category
      description: |-
        Competition category that entries are submitted to.

        Includes the entry form used for submissions, its translated name and description, the season it belongs to, and the rules that govern entries within it. Categories can be nested under a parent category and made available across one or more chapters.
      allOf:
        - $ref: '#/components/schemas/CategoryBase'
        - type: object
          properties:
            chapters:
              type: array
              description: Chapters the category is available in.
              items:
                type: object
                properties:
                  slug:
                    type: string
                    description: Short URL-safe identifier for the chapter.
                  link:
                    type: string
                    format: uri
                    description: Canonical URL for the chapter resource.
                  name:
                    type: object
                    description: Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
                    additionalProperties:
                      type: string
            entrant_max_entries:
              type: integer
              nullable: true
              description: |-
                Maximum number of entries a single entrant may submit to this category.

                `null` when the number of entries is not capped.
            entry_name_label:
              type: object
              description: |-
                Custom label for the entry-name field shown to entrants.

                Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
              additionalProperties:
                type: string
            fill_entry_name:
              type: boolean
              description: Specifies whether entrants are asked to name their entry when submitting to this category.
            image_heading:
              type: object
              description: |-
                Heading shown above the category images.

                Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
              additionalProperties:
                type: string
            images:
              type: array
              description: Images attached to the category.
              items:
                type: object
                properties:
                  token:
                    type: string
                    description: Token identifying the image file.
                  link:
                    type: string
                    format: uri
                    description: Canonical URL for the file resource.
                  filename:
                    type: string
                    description: Original filename as uploaded.
                  download:
                    type: string
                    format: uri
                    description: Time-limited download URL for the image.
            max_image_width:
              type: integer
              description: Maximum display width for the category images, in pixels.
            packing_slip_instructions:
              type: object
              description: |-
                Instructions shown on the packing slip for the category.

                Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
              additionalProperties:
                type: string
            pdf_packing_slip:
              type: boolean
              description: Specifies whether a PDF packing slip is enabled for the category.
