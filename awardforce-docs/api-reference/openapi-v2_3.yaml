                  Map keyed by locale code (for example `en_GB`, `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
                additionalProperties:
                  type: string
              download:
                type: string
                format: uri
                description: Time-limited download URL. Present only for file-typed attachment fields with an underlying file.
        created:
          type: string
          format: date-time
          description: Time the attachment was created.
        file:
          type: object
