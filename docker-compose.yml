x-build-base: &build-base
  build:
    context: .
    args:
      HOST_USER: ${HOST_USER}
      HOST_UID: ${HOST_UID}
      HOST_GID: ${HOST_GID}

x-mint-base: &mint-base
  <<: *build-base
  stdin_open: true
  tty: true
  restart: "no"
  volumes:
    - .:/docs
  environment:
    - NODE_ENV=development

services:
  awardforce:
    <<: *mint-base
    working_dir: /docs/awardforce-docs
    command: /docs/node_modules/.bin/mint dev --port ${MINT_PORT_AWARDFORCE:-3000} --no-open
    ports:
      - "${MINT_PORT_AWARDFORCE:-3000}:${MINT_PORT_AWARDFORCE:-3000}"

  goodgrants:
    <<: *mint-base
    working_dir: /docs/goodgrants-docs
    command: /docs/node_modules/.bin/mint dev --port ${MINT_PORT_GOODGRANTS:-3001} --no-open
    ports:
      - "${MINT_PORT_GOODGRANTS:-3001}:${MINT_PORT_GOODGRANTS:-3001}"

  npm:
    <<: *build-base
    working_dir: /docs
    volumes:
      - .:/docs
    entrypoint: ["npm"]

  redocly:
    image: redocly/cli:2.35.1
    user: "${HOST_UID}:${HOST_GID}"
    working_dir: /spec
    volumes:
      - .:/spec

  schemathesis:
    image: ghcr.io/schemathesis/schemathesis:stable
    user: "${HOST_UID}:${HOST_GID}"
    working_dir: /spec
    environment:
      - HOME=/spec
      - AWARDFORCE_API_URL=${AWARDFORCE_API_URL:-https://api.cr4ce.com}
      - AWARDFORCE_API_KEY=${AWARDFORCE_API_KEY:-}
    volumes:
      - .:/spec
