x-build-base: &build-base
  build:
    context: .
    args:
      USER: ${USER}
      UID: ${UID}
      GID: ${GID}

x-mint-base: &mint-base
  <<: *build-base
  stdin_open: true
  tty: true
  restart: "no"
  volumes:
    - .:/docs
  environment:
    - NODE_ENV=development

services:
  awardforce:
    <<: *mint-base
    working_dir: /docs/awardforce-docs
    command: /docs/node_modules/.bin/mint dev --port ${MINT_PORT_AWARDFORCE:-3000} --no-open
    ports:
      - "${MINT_PORT_AWARDFORCE:-3000}:${MINT_PORT_AWARDFORCE:-3000}"

  goodgrants:
    <<: *mint-base
    working_dir: /docs/goodgrants-docs
    command: /docs/node_modules/.bin/mint dev --port ${MINT_PORT_GOODGRANTS:-3001} --no-open
    ports:
      - "${MINT_PORT_GOODGRANTS:-3001}:${MINT_PORT_GOODGRANTS:-3001}"

  npm:
    <<: *build-base
    working_dir: /docs
    volumes:
      - .:/docs
    entrypoint: ["npm"]

