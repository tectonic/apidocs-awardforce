content:
  application/json:
    schema:
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
          description: Active or inactive state of the category.
          enum:
            - active
            - inactive
        translated:
          type: object
          description: Translated category field values keyed by field name.
          additionalProperties: false
          properties:
            name: &translatedField
              type: object
              description: Values keyed by existing and enabled language code.
              additionalProperties:
                type: string
            description: *translatedField
            application_name_label: *translatedField
            image_heading: *translatedField
            packing_slip_instructions: *translatedField
            shortcode: *translatedField
        chapters:
          type: array
          description: |-
            Array of chapter slugs.

            Each chapter must belong to the category's season.
          items:
            type: string
        divisions:
          type: integer
          minimum: 1
          description: Number of divisions.
        applicant_max_applications:
          type: integer
          nullable: true
          minimum: 1
          description: Maximum number of applications per applicant.
        fill_application_name:
          type: boolean
          description: Specifies whether to prefill the application name when the category is selected.
        locked:
          type: boolean
          description: Specifies whether the category is locked.
        max_image_width:
          type: integer
          description: Maximum image width.
        parent:
          type: string
          description: |-
            Slug of the parent category.

            The parent category must belong to the category's season, and cannot be the category itself or one of its descendants.
        pdf_packing_slip:
          type: boolean
          description: |-
            Specifies whether to generate a PDF packing slip.

            Required when `translated.packing_slip_instructions` is provided.
description: Category update payload.
required: true