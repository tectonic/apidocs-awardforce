description: User create payload.
content:
  application/json:
    schema:
      type: object
      required:
        - first_name
        - last_name
        - password
      anyOf:
        - required:
            - email
        - required:
            - mobile
      properties:
        first_name:
          type: string
          description: User's first name.
        last_name:
          type: string
          description: User's last name.
        password:
          type: string
          description: |-
            Password for the new user. The minimum length and complexity requirements are configured per account, so a value accepted on one account may be rejected on another.
        email:
          type: string
          format: email
          description: User's email address. Required if `mobile` is not set.
        mobile:
          type: string
          description: |-
            User's mobile number in E.164 international format, such as `+14155552671`. Required if `email` is not set.
        roles:
          type: array
          description: |-
            Role slugs to assign to the user. If omitted or empty, the default role for the account is assigned instead, so the user is never left without a role.
          items:
            type: string
        preferences:
          type: object
          description: User notification preferences.
          properties:
            broadcast_emails:
              type: boolean
              description: Specifies whether the user receives broadcast emails.
            notification_emails:
              type: boolean
              description: Specifies whether the user receives notification emails.
            notification_sms:
              type: boolean
              description: Specifies whether the user receives notification text messages.
        user_fields:
          type: object
          description: |-
            User field values, keyed by field slug. For example, `{ "fJkIjGmB": "Test value" }`. Single-value fields take a string; multi-value fields, such as checkbox or multi-select, take an array of strings.
          additionalProperties:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string

