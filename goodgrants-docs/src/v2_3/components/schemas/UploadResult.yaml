type: object
title: UploadResult
description: |-
  Receipt returned when a file is uploaded to a category, chapter, entry, or user field.

  Carries the original filename, a short opaque token that addresses the stored file, and the canonical URL through which the file can be retrieved.
properties:
  filename:
    type: string
    description: Original filename of the uploaded file, including the extension.
  token:
    type: string
    description: Opaque identifier for the stored file. Used as the `{token}` path parameter on `/file/{token}`.
  link:
    type: string
    format: uri
    description: Canonical URL for retrieving the uploaded file.
example:
  filename: example.pdf
  token: AbCdEfGhIjKlMnOp
  link: https://api.au.cr4ce.com/file/AbCdEfGhIjKlMnOp