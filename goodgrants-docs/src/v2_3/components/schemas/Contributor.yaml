type: object
properties:
  application:
    type: object
    description: Application the contributor is attached to.
    properties:
      slug:
        type: string
        description: Short URL-safe identifier for the application.
      link:
        type: string
        format: uri
        description: Canonical URL for the application resource.
      title:
        type: string
        description: Title of the application.
  created:
    type: string
    format: date-time
    description: Date and time when the contributor was created.
  fields:
    type: array
    description: Field values captured for the contributor, one entry per field on the contributor tab.
    items:
      type: object
      properties:
        slug:
          type: string
          description: Short URL-safe identifier for the field.
        link:
          type: string
          format: uri
          description: Canonical URL for the field resource.
        label:
          type: object
          description: |-
            Label of the field, as an HTML fragment.

            Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
          additionalProperties:
            type: string
        title:
          type: object
          description: |-
            Plain-text title of the field.

            Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
          additionalProperties:
            type: string
        value:
          description: |-
            Value submitted for the field. The type depends on the field type — for example, a string for text fields or a boolean for checkbox fields.
          oneOf:
            - type: string
            - type: boolean
        translated:
          type: object
          description: |-
            Translated value submitted for the field.

            Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
          additionalProperties:
            type: string
  season:
    type: object
    description: Season the contributor belongs to.
    properties:
      slug:
        type: string
        description: Short URL-safe identifier for the season.
      link:
        type: string
        format: uri
        description: Canonical URL for the season resource.
      name:
        type: object
        description: |-
          Display name of the season.

          Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
  slug:
    type: string
    description: Short URL-safe identifier for the contributor.
  tab:
    type: object
    description: Contributor tab the contributor belongs to.
    properties:
      slug:
        type: string
        description: Short URL-safe identifier for the tab.
      link:
        type: string
        format: uri
        description: Canonical URL for the tab resource.
      name:
        type: object
        description: |-
          Display name of the tab.

          Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
  updated:
    type: string
    format: date-time
    description: Date and time when the contributor was last updated.
example:
  application:
    slug: IjKlMnOp
    link: https://api.au.cr4ce.com/application/IjKlMnOp
    title: Documentary submission
  created: '2025-01-15T09:00:00Z'
  fields:
    - slug: StUvWxYz
      link: https://api.au.cr4ce.com/field/StUvWxYz
      label:
        en_GB: Team member name
      title:
        en_GB: Team member name
      value: Jane Seymour
      translated:
        en_GB: ''
    - slug: KlMnOpQr
      link: https://api.au.cr4ce.com/field/KlMnOpQr
      label:
        en_GB: <p>Confirmed</p>
      title:
        en_GB: Confirmed
      value: true
      translated:
        en_GB: ''
  season:
    slug: QrStUvWx
    link: https://api.au.cr4ce.com/season/QrStUvWx
    name:
      en_GB: '2025'
  slug: AbCdEfGh
  tab:
    slug: MnOpQrSt
    link: https://api.au.cr4ce.com/tab/MnOpQrSt
    name:
      en_GB: Contributors
  updated: '2025-06-20T14:30:00Z'
