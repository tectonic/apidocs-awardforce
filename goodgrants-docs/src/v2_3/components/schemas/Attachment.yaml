type: object
properties:
  entry:
    type: object
    properties:
      slug:
        type: string
      link:
        type: string
        format: uri
      title:
        type: string
  attachment_fields:
    type: array
    items:
      type: object
      properties:
        slug:
          type: string
        link:
          type: string
          format: uri
        label:
          type: object
          description: |-
            Map keyed by locale code (e.g. `en_GB`, `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
          additionalProperties:
            type: string
        title:
          type: object
          description: |-
            Map keyed by locale code (e.g. `en_GB`, `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
          additionalProperties:
            type: string
        value:
          type: string
        translated:
          type: object
          description: |-
            Map keyed by locale code (e.g. `en_GB`, `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
          additionalProperties:
            type: string
        download:
          type: string
          format: uri
          description: Time-limited download URL. Present only for file-typed attachment fields with an underlying file.
  created:
    type: string
    format: date-time
  file:
    type: object
    properties:
      token:
        type: string
      link:
        type: string
        format: uri
      download:
        type: string
        format: uri
      filename:
        type: string
  order:
    type: integer
  tab:
    type: object
    properties:
      slug:
        type: string
      link:
        type: string
        format: uri
      name:
        type: object
        description: |-
          Map keyed by locale code (e.g. `en_GB`, `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
  token:
    type: string
  updated:
    type: string
    format: date-time
