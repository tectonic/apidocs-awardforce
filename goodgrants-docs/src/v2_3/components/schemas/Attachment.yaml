type: object
title: Attachment
description: |-
  File attached to an application through an attachments-typed form tab.

  Carries the file itself together with the form-field metadata captured against it, the application it belongs to, and the tab through which it was added.
properties:
  application:
    type: object
    description: Application the attachment belongs to.
    properties:
      slug:
        type: string
        description: Short URL-safe identifier for the application.
      link:
        type: string
        format: uri
        description: Canonical URL for the application resource.
      title:
        type: string
        description: Title of the application as submitted by the applicant.
  attachment_fields:
    type: array
    description: |-
      Form fields captured against this attachment.

      One item per field defined on the parent attachments tab, in form order. The exact set of keys varies by field type.
    items:
      type: object
      properties:
        slug:
          type: string
          description: Short URL-safe identifier for the field.
        link:
          type: string
          format: uri
          description: Canonical URL for the field resource.
        label:
          type: object
          description: |-
            Display label shown to the applicant alongside the field. May contain HTML and may be empty.

            Map keyed by locale code (for example `en_GB`, `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
          additionalProperties:
            type: string
        title:
          type: object
          description: |-
            Short title used to refer to the field in administrative contexts.

            Map keyed by locale code (for example `en_GB`, `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
          additionalProperties:
            type: string
        value:
          type: string
          description: Raw stored value for the field, as submitted by the applicant.
        translated:
          type: object
          description: |-
            Human-readable rendering of `value` resolved against the field definition (for example, choice slugs expanded to labels).

            Map keyed by locale code (for example `en_GB`, `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
          additionalProperties:
            type: string
        download:
          type: string
          format: uri
          description: Time-limited download URL. Present only for file-typed attachment fields with an underlying file.
  created:
    type: string
    format: date-time
    description: Time the attachment was created.
  file:
    type: object
    description: File backing the attachment.
    properties:
      token:
        type: string
        description: Token identifying the file.
      link:
        type: string
        format: uri
        description: Canonical URL for the file resource.
      download:
        type: string
        format: uri
        nullable: true
        description: |-
          Time-limited download URL for the underlying file.

          `null` when no signed URL can be resolved for the file (for example, in environments without a configured CDN).
      filename:
        type: string
        description: Original filename as uploaded.
  order:
    type: integer
    description: Position of the attachment within its tab.
  tab:
    type: object
    description: Attachments tab the attachment belongs to.
    properties:
      slug:
        type: string
        description: Short URL-safe identifier for the tab.
      link:
        type: string
        format: uri
        description: Canonical URL for the tab resource.
      name:
        type: object
        description: |-
          Map keyed by locale code (for example `en_GB`, `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
  token:
    type: string
    description: Token identifying the attachment file. Same value as `file.token`.
  updated:
    type: string
    format: date-time
    description: Time the attachment was last updated.
example:
  application:
    slug: AbCdEfGh
    link: https://api.au.cr4ce.com/application/AbCdEfGh
    title: Project title
  attachment_fields:
    - slug: IjKlMnOp
      link: https://api.au.cr4ce.com/field/IjKlMnOp
      label:
        en_GB: Type of attachment
      title:
        en_GB: Type of attachment
      value: Photo
      translated:
        en_GB: Photo
    - slug: QrStUvWx
      link: https://api.au.cr4ce.com/field/QrStUvWx
      label:
        en_GB: <p>URL</p>
      title:
        en_GB: URL
      value: https://example.com/image.svg
      translated:
        en_GB: https://example.com/image.svg
  created: '2025-04-27T01:00:00Z'
  file:
    token: AbCdEfGhIjKlMnOp
    link: https://api.au.cr4ce.com/file/AbCdEfGhIjKlMnOp
    download: https://files.au.cr4ce.com/file/AbCdEfGhIjKlMnOp/example.pdf?Expires=1781485359&Signature=REDACTED&Key-Pair-Id=REDACTED
    filename: example.pdf
  order: 1
  tab:
    slug: YzAbCdEf
    link: https://api.au.cr4ce.com/tab/YzAbCdEf
    name:
      en_GB: Attachments
  token: AbCdEfGhIjKlMnOp
  updated: '2025-04-27T01:05:00Z'
