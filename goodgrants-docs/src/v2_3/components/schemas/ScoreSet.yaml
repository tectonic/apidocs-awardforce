type: object
properties:
  created:
    type: string
    format: date-time
  form:
    type: string
  mode:
    type: string
    enum:
      - qualifying
      - top_pick
      - vip_judging
      - voting
      - gallery
  name:
    type: object
    description: |-
      Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
    additionalProperties:
      type: string
  order:
    type: integer
    nullable: true
  season:
    type: object
    properties:
      slug:
        type: string
      link:
        type: string
        format: uri
      name:
        type: object
        description: |-
          Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
  slug:
    type: string
  updated:
    type: string
    format: date-time
example:
  created: '2026-03-19T08:05:41Z'
  form: vAyNpPvN
  mode: top_pick
  name:
    en_GB: Top pick test
  order: null
  season:
    slug: wboyrBmo
    link: https://api.au.cr4ce.com/season/wboyrBmo
    name:
      en_GB: '2026'
  slug: oJLDVarQ
  updated: '2026-06-03T06:50:18Z'
