  metadata:
    title: ''
    caption: ''
    copyright: ''
    created: ''
    city: ''
    country: ''
    state: ''
    camera: ''
    exposure: ''
    iso: ''
    fstop: ''
    focal_length: ''
    size: 768 x 574
