get:
  summary: Get user
  tags:
    - User
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - name: parameter
      in: path
      required: true
      description: User identifier. Accepts either a user email or an 8-letter slug.
      schema:
        oneOf:
          - type: string
            format: email
          - type: string
            pattern: '^[A-Za-z]{8}$'
  responses:
    '200':
      description: Get user
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Vary:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              analytics_cookies:
                type: boolean
              broadcast_emails:
                type: boolean
              confirmed_at:
                type: string
                format: date-time
              created_at:
                type: string
                format: date-time
              created_by:
                type: string
              email:
                type: string
                format: email
              first_name:
                type: string
              language:
                type: object
                properties:
                  code:
                    type: string
                  language:
                    type: string
              last_name:
                type: string
              marketing_cookies:
                type: boolean
              mobile:
                type: string
                format: utc-millisec
              name:
                type: string
              necessary_cookies:
                type: boolean
              notification_emails:
                type: boolean
              notification_sms:
                type: boolean
              preferences:
                type: object
                properties:
                  broadcast_emails:
                    type: boolean
                  notification_emails:
                    type: boolean
                  notification_sms:
                    type: boolean
              roles:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
              slug:
                type: string
              social_sharing:
                type: boolean
              updated:
                type: string
                format: date-time
              user_fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
                    translated:
                      type: object
                      properties:
                        en_GB:
                          type: string
  description: >-
    Returns a user by email or by its 8-letter slug. The response consists of
    all user fields including files. Files include a download link.
put:
  summary: Update user
  tags:
    - User
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - name: parameter
      in: path
      required: true
      description: User slug. Must be 8 letters.
      schema:
        type: string
        pattern: '^[A-Za-z]{8}$'
  responses:
    '200':
      description: Update user
      content:
        application/json:
          schema:
            type: object
            properties:
              analytics_cookies:
                type: boolean
              broadcast_emails:
                type: boolean
              confirmed_at:
                type: string
                format: date-time
              created_at:
                type: string
                format: date-time
              created_by:
                type: string
              email:
                type: string
                format: email
              first_name:
                type: string
              language:
                type: object
                properties:
                  code:
                    type: string
                  language:
                    type: string
              last_name:
                type: string
              marketing_cookies:
                type: boolean
              mobile:
                type: string
                format: utc-millisec
              name:
                type: string
              necessary_cookies:
                type: boolean
              notification_emails:
                type: boolean
              notification_sms:
                type: boolean
              preferences:
                type: object
                properties:
                  broadcast_emails:
                    type: boolean
                  notification_emails:
                    type: boolean
                  notification_sms:
                    type: boolean
              roles:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
              slug:
                type: string
              social_sharing:
                type: boolean
              updated:
                type: string
                format: date-time
              user_fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
                    translated:
                      type: object
                      properties:
                        en_GB:
                          type: string
  description: >-
    Update an existing user.


    | Parameter | Required | Type | Description |

    | --- | --- | --- | --- |

    | first_name | No | String | User's first name |

    | last_name | No | String | User's last name |

    | password | No | String | Password for accessing the account |

    | email | No | String | User's email address |

    | mobile | No | String | User's mobile number |

    | roles | No | Array | Array of Role slugs |

    | preferences | No | Object | Object containing key / value pairs where keys
    can be any of the following:<br><br>- broadcast_emails<br><br>-
    notification_emails<br><br>- notification_sms<br><br>Values are of type
    Boolean |

    | user_fields | No | Object | Object containing key / value pairs. Where the
    key is the Field slug. e.g. "fJkIjGmB": "Test value" |
delete:
  summary: Delete user
  tags:
    - User
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - name: parameter
      in: path
      required: true
      description: User slug. Must be 8 letters.
      schema:
        type: string
        pattern: '^[A-Za-z]{8}$'
  responses:
    '204':
      description: Delete user
      headers:
        Date:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
  description: Delete an existing user.
