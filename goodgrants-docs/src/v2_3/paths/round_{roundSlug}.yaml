parameters:
  - $ref: ../components/parameters/roundSlug.yaml
get:
  summary: Retrieve a round
  operationId: GetRoundV23
  tags:
    - Round
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Round retrieved.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Round.yaml
  description: Retrieves the round identified by the specified slug.
