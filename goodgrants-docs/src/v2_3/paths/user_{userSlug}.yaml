get:
  summary: Retrieve a user
  operationId: GetUserV23
  tags:
    - User
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/userSlugParameter.yaml
  responses:
    '200':
      description: User retrieved.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/User.yaml
  description: Retrieves the user identified by the specified slug or email address.
  x-mint:
    content: |-
      The response includes all user fields. File fields include a download link.
put:
  summary: Update a user
  operationId: PutUserV23
  tags:
    - User
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/userSlug.yaml
  requestBody:
    $ref: ../components/requestBodies/UserUpdate.yaml
  responses:
    '200':
      description: User updated.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/User.yaml
  description: Updates the user identified by the specified slug.
delete:
  summary: Delete a user
  operationId: DeleteUserV23
  tags:
    - User
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/userSlug.yaml
  responses:
    '204':
      description: User deleted.
      headers:
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
  description: Deletes the user identified by the specified slug.
