parameters:
  - name: slug
    in: path
    required: true
    schema:
      type: string
get:
  summary: Get webhook
  operationId: GetWebhookV23
  tags:
    - Webhook
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Get webhook
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              events:
                type: array
                items:
                  type: string
              method:
                type: string
              name:
                type: string
              slug:
                type: string
              signing_key:
                type: string
              url:
                type: string
                format: uri
              updated:
                type: string
                format: date-time
  description: Returns a webhook by its slug.
put:
  summary: Update webhook
  operationId: PutWebhookV23
  tags:
    - Webhook
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Update webhook
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              events:
                type: array
                items:
                  type: string
              method:
                type: string
              name:
                type: string
              slug:
                type: string
              signing_key:
                type: string
              url:
                type: string
                format: uri
              updated:
                type: string
                format: date-time
  description: >-
    Update events, name and method of an existing webhook.


    | Parameter | Required | Type | Description |

    | --- | --- | --- | --- |

    | method | No | String | HTTP supported methods ("get"/"post") |

    | name | No | String | Name of the webhook |

    | url | No | String | URL for the webhook |

    | signing_key | No | String | Requests will be signed using this key and you
    can use it to validate the webhook payload. |

    | events | No | Array | List of events will trigger the webhook. Example:
    \['role_granted', 'allocation_created'\] |
delete:
  summary: Delete webhook
  operationId: DeleteWebhookV23
  tags:
    - Webhook
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '204':
      description: Delete webhook
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Set-Cookie:
          $ref: ../components/headers/Set-Cookie.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
  description: Delete an existing webhook.
