      description: Get Round
      content:
        application/json:
          schema:
            type: object
            properties:
              chapters:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
              created:
                type: string
                format: date-time
              end_date:
                type: string
                format: style
              form:
                type: string
              name:
                type: object
                properties:
                  en_GB:
                    type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                        format: utc-millisec
              slug:
                type: string
              start_date:
                type: string
                format: style
              type:
                type: string
              updated:
                type: string
