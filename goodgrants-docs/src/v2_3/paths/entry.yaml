get:
  summary: List entries
  tags:
    - Entry
  parameters:
    - name: title
      in: query
      required: false
      description: Full or partial name of the entry
      schema:
        type: string
    - name: category
      in: query
      required: false
      description: Category slug
      schema:
        type: string
    - name: chapter
      in: query
      required: false
      description: Chapter slug
      schema:
        type: string
    - name: status
      in: query
      required: false
      description: |-
        - submitted
        - in_progress
        - resubmission_required
        - resubmitted
      schema:
        type: string
    - name: payment_status
      in: query
      required: false
      description: |-
        Status of the order. Possible values:
        paid
        awaiting_payment
      schema:
        type: string
    - name: price
      in: query
      required: false
      description: Price slug
      schema:
        type: string
    - name: review_status
      in: query
      required: false
      description: All available review statuses in the program
      schema:
        type: string
    - name: moderation
      in: query
      required: false
      description: |-
        - approved
        - undecided
        - rejected
      schema:
        type: string
    - name: season
      in: query
      required: false
      description: |-
        - Season slug
        - "all" to show all seasons
      schema:
        type: string
    - name: form
      in: query
      required: false
      description: Form slug
      schema:
        type: string
    - name: tag
      in: query
      required: false
      description: All available tags in the program
      schema:
        type: string
    - name: entrant
      in: query
      required: false
      description: Entrant slug
      schema:
        type: string
    - name: deleted
      in: query
      required: false
      description: |-
        - only (show only deleted entries)
        - included (include deleted entries)
        - none (exclude deleted entries)
      schema:
        type: string
    - name: archived
      in: query
      required: false
      description: |-
        - only (show only archived entries)
        - all (include archived entries)
        - none (exclude archived entries)
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: string
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: string
    - name: order
      in: query
      required: false
      description: |-
        Column name to order by. The following options are available:
        - category (slug)
        - chapter (slug)
        - applicant (slug)
        - local_id
        - parent_category (slug)
        - title
        - updated
      schema:
        type: string
    - name: dir
      in: query
      required: false
      description: |-
        - asc
        - desc
      schema:
        type: string
    - name: updated_at
      in: query
      required: false
      description: |-
        - [before]=YYYY-MM-DDTHH:MM:SSZ
        - [after]=YYYY-MM-DDTHH:MM:SSZ
        - [on]=YYYY-MM-DDTHH:MM:SSZ
        - [between]=[YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ]
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
    - name: x-api-language
      in: header
      required: false
      description: Defines the languages to include in the response.
      schema:
        type: string
  responses:
    '200':
      description: List entries
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Set-Cookie:
          schema:
            type: string
        Vary:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              current_page:
                type: integer
              data:
                type: array
                items:
                  type: object
                  properties:
                    entrant:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: string
                        first_name:
                          type: string
                        last_name:
                          type: string
                        email:
                          type: string
                          format: email
                        global_id:
                          type: string
                    auto_score:
                      type: integer
                    category:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                    chapter:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                    comments:
                      type: string
                    contributor_count:
                      type: integer
                    created:
                      type: string
                      format: date-time
                    custom_deadline:
                      type: string
                    division:
                      nullable: true
                    eligibility_status:
                      type: string
                    files_count:
                      type: integer
                    form:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                    grant_end_date:
                      nullable: true
                    grant_status:
                      nullable: true
                    local_id:
                      type: integer
                    moderation_status:
                      type: string
                    parent_category:
                      nullable: true
                    payment_status:
                      type: string
                    plagiarism_scan_status:
                      type: string
                    review_status:
                      type: string
                    season:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                              format: utc-millisec
                    slug:
                      type: string
                    status:
                      type: string
                    submitted:
                      nullable: true
                    tags:
                      type: string
                    title:
                      type: string
                    updated:
                      type: string
                      format: date-time
                    user_comments:
                      type: string
              first_page_url:
                type: string
                format: uri
              from:
                type: integer
              last_page:
                type: integer
              last_page_url:
                type: string
                format: uri
              next_page_url:
                type: string
              path:
                type: string
                format: uri
              per_page:
                type: integer
              prev_page_url:
                type: string
              to:
                type: integer
              total:
                type: integer
  description: Returns a list of entries.
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            brand:
              type: string
post:
  summary: Create entry
  tags:
    - Entry
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Create entry
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Location:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              attachments:
                type: array
                items:
                  type: object
                  properties:
                    token:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: string
                    download:
                      type: string
                    attachment_fields:
                      type: array
                      items:
                        type: object
                        properties:
                          slug:
                            type: string
                          link:
                            type: string
                            format: uri
                          label:
                            type: object
                            properties:
                              en_GB:
                                type: string
                          value:
                            type: string
                          translated:
                            type: object
                            properties:
                              en_GB:
                                type: string
              category:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              chapter:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              comments:
                type: string
              contributor_count:
                type: integer
              contributors:
                type: array
                items: {}
              created:
                type: string
                format: date-time
              custom_deadline:
                type: string
                format: style
              division:
                nullable: true
              eligibility_status:
                type: string
              entrant:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: string
                  first_name:
                    type: string
                  last_name:
                    type: string
              entry_fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
                    translated:
                      type: object
                      properties:
                        en_GB:
                          type: string
              files_count:
                type: integer
              form:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              local_id:
                type: integer
              moderation_status:
                type: string
              parent_category:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              payment_status:
                type: string
              plagiarism_scan_status:
                type: string
              resubmitted:
                type: string
              review_status:
                type: string
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
              slug:
                type: string
              status:
                type: string
              submitted:
                type: string
                format: date-time
              tags:
                type: string
              title:
                type: string
              updated:
                type: string
                format: date-time
  description: >-
    Create a new entry.


    | Parameter | Required | Type | Description |

    | --- | --- | --- | --- |

    | category | Yes | String | Category slug |

    | chapter | No | String | Chapter slug |

    | entrant | Yes | String | Entrant slug |

    | season | Yes | String | Season slug |

    | title | Yes | String | Entry title |

    | form | No | String | Form slug |

    | status | No | String | One of the following values:  <br>  <br>  <br><br>-
    submitted<br><br>- in_progress<br><br>- resubmission_required |

    | moderation_status | No | String | One of the following values:  <br> 
    <br>  <br><br>- approved<br><br>- undecided<br><br>- rejected |

    | entry_fields | No | Object | Object containing key / value pairs. Where
    the key is the Field slug.  <br>e.g. "fJkIjGmB": "Test value" |

    | custom_deadline | No | Date | Date with format yyyy-mm-dd hh:mm |
