get:
  summary: Retrieve assignments
  operationId: GetAssignmentCollectionV23
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/assignmentSlugFilter.yaml
    - $ref: ../components/parameters/assignmentStatusFilter.yaml
    - $ref: ../components/parameters/categoryFilter.yaml
    - $ref: ../components/parameters/chapterFilter.yaml
    - $ref: ../components/parameters/judgeFilter.yaml
    - $ref: ../components/parameters/methodFilter.yaml
    - $ref: ../components/parameters/panelFilter.yaml
    - $ref: ../components/parameters/scoreSetFilter.yaml
    - $ref: ../components/parameters/seasonFilter.yaml
    - $ref: ../components/parameters/stateFilter.yaml
    - $ref: ../components/parameters/tagFilter.yaml
    - $ref: ../components/parameters/deletedFilter.yaml
    - $ref: ../components/parameters/trashedFilter.yaml
    - $ref: ../components/parameters/page.yaml
    - $ref: ../components/parameters/perPage.yaml
    - $ref: ../components/parameters/assignmentOrder.yaml
    - $ref: ../components/parameters/sortDirection.yaml
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Assignments retrieved.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AssignmentList.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
  description: Retrieves assignments that match the specified filters.
post:
  summary: Create an assignment
  operationId: PostAssignmentV23
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '202':
      description: Assignment creation accepted.
      headers:
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            type: object
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
  description: Creates a new assignment.
  requestBody:
    $ref: ../components/requestBodies/AssignmentCreate.yaml
