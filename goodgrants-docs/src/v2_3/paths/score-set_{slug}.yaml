        application/json:
          schema:
            type: object
            properties:
              created:
                type: string
                format: date-time
              form:
                type: string
              mode:
                type: string
              name:
                type: object
                properties:
                  en_GB:
                    type: string
              order:
                type: integer
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                        format: utc-millisec
              slug:
                type: string
              updated:
                type: string
                format: date-time
