get:
  summary: Get score set
  tags:
    - Score set
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Get scoreset
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Vary:
          schema:
            type: string
        X-DataDome:
          schema:
            type: string
        Accept-CH:
          schema:
            type: string
        Set-Cookie:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              created:
                type: string
                format: date-time
              form:
                type: string
              mode:
                type: string
              name:
                type: object
                properties:
                  en_GB:
                    type: string
              order:
                type: integer
              season:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
                        format: utc-millisec
              slug:
                type: string
              updated:
                type: string
                format: date-time
  description: Returns a score set by its slug.
parameters:
  - name: slug
    in: path
    required: true
    schema:
      type: string
