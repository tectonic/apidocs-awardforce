get:
  summary: List fields
  tags:
    - Field
  parameters:
    - name: category
      in: query
      required: false
      description: Category slug
      schema:
        type: string
    - name: form
      in: query
      required: false
      description: Form slug
      schema:
        type: string
    - name: resource
      in: query
      required: false
      description: |-
        - entries
        - users
        - attachments
        - contributors 
      schema:
        type: string
    - name: deleted
      in: query
      required: false
      description: |-
        One of the following: 
        - only (show only deleted fields)
        - included (include deleted fields)
        - none (exclude deleted fields)
      schema:
        type: string
    - name: tab
      in: query
      required: false
      description: Tab slug
      schema:
        type: string
    - name: type
      in: query
      required: false
      description: |-
        - checkbox
        - checkboxlist
        - content
        - country
        - currency
        - date
        - datetime
        - drop-down-list
        - email
        - file
        - numeric
        - phone
        - radio
        - table
        - text
        - textarea
        - time
        - url
      schema:
        type: string
    - name: order
      in: query
      required: false
      description: |-
        - title
        - resource
        - type
        - updated
        - created
        - categories
        - order
        - tab
      schema:
        type: string
    - name: protection
      in: query
      required: false
      description: |-
        - standard
        - elevated
        - maximum
      schema:
        type: string
    - name: conditional
      in: query
      required: false
      description: conditional
      schema:
        type: string
    - name: dir
      in: query
      required: false
      description: |-
        - asc
        - desc
      schema:
        type: string
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: string
    - name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
    - name: x-api-language
      in: header
      required: false
      description: Defines the languages to include in the response.
      schema:
        type: string
  responses:
    default:
      description: List fields
      content:
        application/json:
          schema:
            type: object
            properties:
              current_page:
                type: integer
              data:
                type: array
                items:
                  type: object
                  properties:
                    applicant_read_access:
                      type: string
                    applicant_write_access:
                      type: string
                    auto_scoring:
                      type: integer
                    categories:
                      type: array
                      items:
                        type: string
                    category_count:
                      type: string
                    conditional_field:
                      nullable: true
                    created:
                      type: string
                      format: date-time
                    file_types:
                      type: array
                      items: {}
                    form:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                    help_text:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    hint_text:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    max_file_size:
                      nullable: true
                    maximum_characters:
                      nullable: true
                    maximum_words:
                      nullable: true
                    minimum_characters:
                      nullable: true
                    minimum_words:
                      nullable: true
                    options:
                      type: array
                      items:
                        type: string
                    order:
                      type: integer
                    protection:
                      type: string
                    registration:
                      nullable: true
                    required:
                      type: boolean
                    resource:
                      type: string
                    scores:
                      type: object
                      properties:
                        'Yes':
                          type: integer
                        'No':
                          type: integer
                    searchable:
                      type: boolean
                    season:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                              format: utc-millisec
                    slug:
                      type: string
                    tab:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                    title:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    type:
                      type: string
                    updated:
                      type: string
                      format: date-time
                    visibility:
                      type: array
                      items: {}
              first_page_url:
                type: string
                format: uri
              from:
                type: integer
              last_page:
                type: integer
              last_page_url:
                type: string
                format: uri
              next_page_url:
                type: string
              path:
                type: string
                format: uri
              per_page:
                type: integer
              prev_page_url:
                type: string
              to:
                type: integer
              total:
                type: integer
  description: Returns a list of fields.
