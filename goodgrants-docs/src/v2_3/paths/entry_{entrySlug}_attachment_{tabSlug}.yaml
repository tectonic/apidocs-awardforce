parameters:
  - $ref: ../components/parameters/entrySlug.yaml
  - $ref: ../components/parameters/tabSlug.yaml
post:
  summary: Create an attachment
  operationId: PostEntryAttachmentV23
  tags:
    - Attachment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Attachment created.
      headers:
        Location:
          $ref: ../components/headers/Location.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              token:
                type: string
              link:
                type: string
                format: uri
              file:
                $ref: ../components/schemas/UploadResult.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Creates an attachment on the specified application under the specified tab.
  x-mint:
    content: |-
      <Note>
      The tab must be of type `Attachments`; tabs of other types are rejected.
      </Note>

      <Note>
      Attachment fields are linked to the attachment and are distinct from form fields. If the attachment has no attachment fields, you can omit `attachment_fields` from the request body.
      </Note>

      <Warning>
      The uploaded file is validated and stored before the response is returned; the attachment itself is finalized shortly after. A `GET` on the returned `Location` immediately after the `201` may briefly return a response with a `null` body until finalization is complete.
      </Warning>
  requestBody:
    $ref: ../components/requestBodies/AttachmentUpload.yaml
