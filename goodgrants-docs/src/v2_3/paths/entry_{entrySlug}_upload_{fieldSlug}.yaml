parameters:
  - $ref: ../components/parameters/entrySlug.yaml
  - $ref: ../components/parameters/fieldSlug.yaml
post:
  summary: Upload an entry file
  operationId: PostEntryUploadV23
  tags:
    - Application
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Entry file uploaded.
      headers:
        Location:
          $ref: ../components/headers/Location.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UploadResult.yaml
  description: Uploads a file to the specified field for the entry identified by the specified slug.
