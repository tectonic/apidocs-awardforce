get:
  summary: Retrieve categories
  operationId: GetCategoryCollectionV23
  tags:
    - Category
  parameters:
    - name: status
      in: query
      required: false
      description: |-
        Filter by one of the following status values:
        - active
        - inactive
      schema:
        type: string
    - name: chapter
      in: query
      required: false
      description: Filter by chapter slug.
      schema:
        type: string
    - name: parent
      in: query
      required: false
      description: Filter by parent category slug.
      schema:
        type: string
    - name: season
      in: query
      required: false
      description: Filter by season slug.
      schema:
        type: string
    - name: deleted
      in: query
      required: false
      description: |-
        Filter by deletion status using one of the following modes:
        - only (show only deleted categories)
        - included (include deleted categories)
        - none (exclude deleted categories)
      schema:
        type: string
    - name: form
      in: query
      required: false
      description: Filter by form slug.
      schema:
        type: string
    - $ref: ../components/parameters/perPage.yaml
    - $ref: ../components/parameters/page.yaml
    - name: order
      in: query
      required: false
      description: |-
        Order results by one of the following columns:
        - chapters
        - created
        - divisions
        - entry_count
        - name
        - parent
        - season
        - shortcode
        - status
        - updated
      schema:
        type: string
    - name: dir
      in: query
      required: false
      description: |-
        Order results in one of the following directions:
        - asc
        - desc
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Categories retrieved.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Set-Cookie:
          $ref: ../components/headers/Set-Cookie.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CategoryList.yaml
  description: Retrieves categories.
post:
  summary: Create a category
  operationId: PostCategoryV23
  tags:
    - Category
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - season
            - status
            - translated
          properties:
            season:
              type: string
              description: Slug of the season.
            status:
              type: string
              description: One of the following values.
              enum:
                - active
                - inactive
            translated:
              type: object
              description: Translated category field values keyed by field name.
              additionalProperties: false
              required:
                - name
              properties:
                name: &translatedField
                  type: object
                  description: Values keyed by existing and enabled language code.
                  additionalProperties:
                    type: string
                description: *translatedField
                entry_name_label: *translatedField
                image_heading: *translatedField
                packing_slip_instructions: *translatedField
                shortcode: *translatedField
            chapters:
              type: array
              description: Array of chapter slugs.
              items:
                type: string
            divisions:
              type: integer
              description: Number of divisions.
            entrant_max_entries:
              type: integer
              description: Maximum number of entries per entrant.
            fill_entry_name:
              type: boolean
              description: Specifies whether to prefill the entry name when the category is selected.
            max_image_width:
              type: integer
              description: Maximum image width.
            form:
              type: string
              description: Slug of the form.
            parent:
              type: string
              description: Slug of the parent category.
            pdf_packing_slip:
              type: boolean
              description: Specifies whether to generate a PDF packing slip.
  responses:
    '201':
      description: Category created.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Location:
          $ref: ../components/headers/Location.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Category.yaml
  description: Creates a category.
