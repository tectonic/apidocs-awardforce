get:
  summary: Retrieve webhooks
  operationId: GetWebhookCollectionV23
  tags:
    - Webhook
  parameters:
    - $ref: ../components/parameters/webhookHttpMethodFilter.yaml
    - $ref: ../components/parameters/webhookSubscriptionEventFilter.yaml
    - $ref: ../components/parameters/webhookUrlFilter.yaml
    - $ref: ../components/parameters/perPage.yaml
    - $ref: ../components/parameters/page.yaml
    - $ref: ../components/parameters/webhookOrder.yaml
    - $ref: ../components/parameters/sortDirection.yaml
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: Webhooks retrieved.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Set-Cookie:
          $ref: ../components/headers/Set-Cookie.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/WebhookList.yaml
  description: Retrieves webhooks.
post:
  summary: Create a webhook
  operationId: PostWebhookV23
  tags:
    - Webhook
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  requestBody:
    $ref: ../components/requestBodies/WebhookCreate.yaml
  responses:
    '201':
      description: Webhook created.
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Location:
          $ref: ../components/headers/Location.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Webhook.yaml
  description: Creates a webhook.
  x-mint:
    content: |-
      Each webhook subscribes to one or more events. When a subscribed event occurs, the webhook URL receives a payload describing the event.

      **Supported subscription events:**

      - allocation_created
      - allocation_payment_created
      - allocation_payment_deleted
      - allocation_payment_status_changed
      - allocation_payment_updated
      - assignment_completed
      - assignment_created
      - collaborator_invited
      - document_created
      - document_deleted
      - document_updated
      - entry_created
      - entry_eligible
      - entry_ineligible
      - entry_moderated
      - entry_resubmitted
      - entry_submitted
      - entry_tagged
      - entry_updated
      - field_value_updated
      - membership_registered (user created)
      - payment_pending
      - payment_success
      - review_task_created
      - review_task_submitted
      - role_granted
      - user_updated
