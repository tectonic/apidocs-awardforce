get:
  summary: Get file info
  tags:
    - File
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Get file info
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              download_link:
                type: string
              duration:
                nullable: true
              filename:
                type: string
              image_height:
                nullable: true
              image_width:
                nullable: true
              metadata:
                type: object
                properties:
                  title:
                    type: string
                  caption:
                    type: string
                  copyright:
                    type: string
                  created:
                    type: string
                  city:
                    type: string
                  country:
                    type: string
                  state:
                    type: string
                  camera:
                    type: string
                  exposure:
                    type: string
                  iso:
                    type: string
                  fstop:
                    type: string
                  focal_length:
                    type: string
                  size:
                    type: string
              mime:
                type: string
              size:
                type: integer
              transcoding:
                type: array
                items:
                  type: object
                  properties:
                    basename:
                      type: string
                    download_link:
                      type: string
                    extension:
                      type: string
                    timestamp:
                      type: integer
                    size:
                      type: integer
                    etag:
                      type: string
  description: Returns file information by its token.
parameters:
  - $ref: ../components/parameters/token.yaml
