get:
  summary: Retrieve assignments
  tags:
    - Assignment
  parameters:
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: string
    - name: status
      in: query
      required: false
      description: |-
        - none
        - in_progress
        - complete
        - abstained
      schema:
        type: string
    - name: score_set
      in: query
      required: false
      description: Score Set slug
      schema:
        type: string
    - name: panel
      in: query
      required: false
      description: Panel slug
      schema:
        type: string
    - name: tag
      in: query
      required: false
      description: Tag
      schema:
        type: string
    - name: season
      in: query
      required: false
      description: Season slug
      schema:
        type: string
    - name: method
      in: query
      required: false
      description: |-
        - automatic
        - manual
        - random
        - stray
      schema:
        type: string
    - name: judge
      in: query
      required: false
      description: Judge slug
      schema:
        type: string
    - name: state
      in: query
      required: false
      description: |-
        - undecided
        - approved
        - rejected
      schema:
        type: string
    - name: chapter
      in: query
      required: false
      description: Chapter slug
      schema:
        type: string
    - name: category
      in: query
      required: false
      description: Category slug
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Assignments retrieved.
      headers:
        Server:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Vary:
          schema:
            type: string
        X-Powered-By:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Date:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              current_page:
                type: integer
              data:
                type: array
                items:
                  type: object
                  properties:
                    application:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        title:
                          type: string
                    category:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                    chapter:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                    comments:
                      type: object
                      properties:
                        judging:
                          type: array
                          items:
                            type: object
                            properties:
                              slug:
                                type: string
                              comment:
                                type: string
                              created_at:
                                type: string
                                format: date-time
                              updated_at:
                                type: string
                                format: date-time
                              user:
                                type: object
                                properties:
                                  slug:
                                    type: string
                                  link:
                                    type: string
                                    format: uri
                                  name:
                                    type: string
                                  first_name:
                                    type: string
                                  last_name:
                                    type: string
                        abstention:
                          type: array
                          items:
                            type: object
                            properties:
                              slug:
                                type: string
                              comment:
                                type: string
                              created_at:
                                type: string
                                format: date-time
                              updated_at:
                                type: string
                                format: date-time
                              user:
                                type: object
                                properties:
                                  slug:
                                    type: string
                                  link:
                                    type: string
                                    format: uri
                                  name:
                                    type: string
                                  first_name:
                                    type: string
                                  last_name:
                                    type: string
                        conflict:
                          type: array
                          items:
                            type: object
                            properties:
                              slug:
                                type: string
                              comment:
                                type: string
                              created_at:
                                type: string
                                format: date-time
                              updated_at:
                                type: string
                                format: date-time
                              user:
                                type: object
                                properties:
                                  slug:
                                    type: string
                                  link:
                                    type: string
                                    format: uri
                                  name:
                                    type: string
                                  first_name:
                                    type: string
                                  last_name:
                                    type: string
                        criteria:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              comments:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    slug:
                                      type: string
                                    comment:
                                      type: string
                                    created_at:
                                      type: string
                                      format: date-time
                                    updated_at:
                                      type: string
                                      format: date-time
                                    user:
                                      type: object
                                      properties:
                                        slug:
                                          type: string
                                        link:
                                          type: string
                                          format: uri
                                        name:
                                          type: string
                                        first_name:
                                          type: string
                                        last_name:
                                          type: string
                    created:
                      type: string
                      format: date-time
                    form:
                      type: string
                    method:
                      type: string
                    panels:
                      type: array
                      items: {}
                    reviewer:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: string
                    role:
                      nullable: true
                    rounds:
                      type: array
                      items:
                        type: object
                        properties:
                          slug:
                            type: string
                          link:
                            type: string
                            format: uri
                          name:
                            type: object
                            properties:
                              en_GB:
                                type: string
                    score_set:
                      type: object
                      properties:
                        slug:
                          type: string
                        link:
                          type: string
                          format: uri
                        name:
                          type: object
                          properties:
                            en_GB:
                              type: string
                    slug:
                      type: string
                    status:
                      type: string
                    updated:
                      type: string
                      format: date-time
              first_page_url:
                type: string
                format: uri
              from:
                type: integer
              last_page:
                type: integer
              last_page_url:
                type: string
                format: uri
              next_page_url:
                type: string
              path:
                type: string
                format: uri
              per_page:
                type: integer
              prev_page_url:
                type: string
              to:
                type: integer
              total:
                type: integer
  description: Retrieves assignments that match the specified filters.
post:
  summary: Create an assignment
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '202':
      description: Assignment creation accepted.
      headers:
        Server:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        X-Powered-By:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Date:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
  description: |-
    Creates a new assignment.

    | Parameter | Required | Type | Description |
    | --- | --- | --- | --- |
    | score_set | Yes | String | Score Set slug |
    | entries | Yes | Array | List of Entry slugs |
    | judges | Yes | Array | List of Judge slugs |
    | rounds | Yes | Array | List of Round slugs |
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            score_set:
              type: string
            entries:
              type: array
              items:
                type: string
            judges:
              type: array
              items:
                type: string
            rounds:
              type: array
              items:
                type: string
