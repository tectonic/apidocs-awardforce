put:
  summary: Unrecuse assignment
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '204':
      description: Unrecuse assignment
      headers:
        Server:
          schema:
            type: string
        Connection:
          schema:
            type: string
        X-Powered-By:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Date:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
  description: |-
    Unrecuse a judge from an existing assignment.

    | Parameter | Required | Type | Description |
    | --- | --- | --- | --- |
    | judge | Yes | String | Judge slug |
    | score_set | No | String | Score Set slug |
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            judge:
              type: string
            score_set:
              type: string
parameters:
  - name: slug
    in: path
    required: true
    schema:
      type: string
