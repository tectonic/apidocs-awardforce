get:
  summary: Get user by email
  tags:
    - User
  parameters:
    - name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
    - name: x-api-key
      in: header
      required: true
      description: Used for authentication and authorisation.
      schema:
        type: string
  responses:
    '200':
      description: Get user by email
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Vary:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              analytics_cookies:
                type: boolean
              broadcast_emails:
                type: boolean
              confirmed_at:
                type: string
                format: date-time
              created_at:
                type: string
                format: date-time
              created_by:
                type: string
              email:
                type: string
                format: email
              first_name:
                type: string
              language:
                type: object
                properties:
                  code:
                    type: string
                  language:
                    type: string
              last_name:
                type: string
              marketing_cookies:
                type: boolean
              mobile:
                type: string
                format: utc-millisec
              name:
                type: string
              necessary_cookies:
                type: boolean
              notification_emails:
                type: boolean
              notification_sms:
                type: boolean
              preferences:
                type: object
                properties:
                  broadcast_emails:
                    type: boolean
                  notification_emails:
                    type: boolean
                  notification_sms:
                    type: boolean
              roles:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
              slug:
                type: string
              social_sharing:
                type: boolean
              updated:
                type: string
                format: date-time
              user_fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
                    translated:
                      type: object
                      properties:
                        en_GB:
                          type: string
  description: >-
    Returns a user by its email. The response consists of all user fields
    including files. Files include a download link.
parameters:
  - name: email
    in: path
    required: true
    description: User email
    schema:
      type: string
