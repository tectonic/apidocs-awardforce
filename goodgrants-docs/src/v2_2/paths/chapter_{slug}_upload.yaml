post:
  summary: Upload chapter file
  tags:
    - Chapter
  parameters:
    - name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
  responses:
    '201':
      description: Upload chapter file
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Location:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              filename:
                type: string
              token:
                type: string
              link:
                type: string
                format: uri
  description: Upload a chapter image.
parameters:
  - name: slug
    in: path
    required: true
    description: Chapter slug
    schema:
      type: string
