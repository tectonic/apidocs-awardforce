parameters:
  - $ref: ../components/parameters/assignmentSlug.yaml
get:
  summary: Retrieve an assignment
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Assignment retrieved.
      headers:
        Server:
          $ref: ../components/headers/Server.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        X-Powered-By:
          $ref: ../components/headers/X-Powered-By.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Date:
          $ref: ../components/headers/Date.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Assignment.yaml
  description: Retrieves an assignment identified by the specified assignment slug.
delete:
  summary: Delete an assignment
  tags:
    - Assignment
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '204':
      description: Assignment deleted.
      headers:
        Server:
          $ref: ../components/headers/Server.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        X-Powered-By:
          $ref: ../components/headers/X-Powered-By.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Date:
          $ref: ../components/headers/Date.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
      content:
        application/json:
          schema:
            type: object
  description: Deletes an existing assignment.
