get:
  summary: List webooks
  tags:
    - Webhook
  parameters:
    - name: http_method
      in: query
      required: false
      description: |-
        - post
        - get
      schema:
        type: string
    - name: subscription_event
      in: query
      required: false
      description: |-
        - allocation_created
        - allocation_payment_created
        - allocation_payment_deleted
        - allocation_payment_status_changed
        - allocation_payment_updated
        - assignment_completed
        - assignment_created
        - collaborator_invited
        - document_created
        - document_deleted
        - document_updated
        - entry_created
        - entry_eligible
        - entry_ineligible
        - entry_moderated
        - entry_resubmitted
        - entry_submitted
        - entry_tagged
        - entry_updated
        - field_value_updated
        - membership_registered
        - payment_pending
        - payment_success
        - review_task_created
        - review_task_submitted
        - role_granted
        - user_updated
      schema:
        type: string
    - name: url
      in: query
      required: false
      description: URL of the webhook
      schema:
        type: string
    - $ref: ../components/parameters/perPage.yaml
    - $ref: ../components/parameters/page.yaml
    - name: order
      in: query
      required: false
      description: |-
        Column name to order by. The following options are available:
        - events
        - http_method
        - notification_emails
        - signing_keys
        - title
        - updated
        - url
      schema:
        type: string
    - name: dir
      in: query
      required: false
      description: |-
        - asc
        - desc
      schema:
        type: string
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '200':
      description: List webhooks
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Set-Cookie:
          $ref: ../components/headers/Set-Cookie.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              current_page:
                type: integer
              data:
                type: array
                items:
                  type: object
                  properties:
                    events:
                      type: array
                      items:
                        type: string
                    method:
                      type: string
                    name:
                      type: string
                    slug:
                      type: string
                    signing_key:
                      type: string
                    url:
                      type: string
                      format: uri
                    updated:
                      type: string
                      format: date-time
              first_page_url:
                type: string
                format: uri
              from:
                type: integer
              last_page:
                type: integer
              last_page_url:
                type: string
                format: uri
              next_page_url:
                type: string
              path:
                type: string
                format: uri
              per_page:
                type: integer
              prev_page_url:
                type: string
              to:
                type: integer
              total:
                type: integer
  description: Returns a list of webhooks.
post:
  summary: Create webhook
  tags:
    - Webhook
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Create webhook
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        Location:
          $ref: ../components/headers/Location.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              events:
                type: array
                items:
                  type: string
              method:
                type: string
              name:
                type: string
              slug:
                type: string
              signing_key:
                type: string
              url:
                type: string
                format: uri
              updated:
                type: string
                format: date-time
  description: >-
    Create a new webhook.


    **Supported webhook triggers:**


    - allocation_created
        
    - allocation_payment_created
        
    - allocation_payment_deleted
        
    - allocation_payment_status_changed
        
    - allocation_payment_updated
        
    - assignment_completed
        
    - assignment_created
        
    - collaborator_invited
        
    - document_created
        
    - document_deleted
        
    - document_updated
        
    - entry_created
        
    - entry_eligible
        
    - entry_ineligible
        
    - entry_moderated
        
    - entry_resubmitted
        
    - entry_submitted
        
    - entry_tagged
        
    - entry_updated
        
    - field_value_updated
        
    - membership_registered (User created)
        
    - payment_pending
        
    - payment_success
        
    - review_task_created
        
    - review_task_submitted
        
    - role_granted
        
    - user_updated
        

    | Parameter | Required | Type | Description |

    | --- | --- | --- | --- |

    | method | Yes | String | HTTP supported methods ("get"/"post") |

    | name | Yes | String | Name of the webhook |

    | url | Yes | String | URL for the webhook |

    | signing_key | No | String | Requests will be signed using this key and you
    can use it to validate the webhook payload. |

    | events | Yes | Array | List of events will trigger the webhook. Example:
    \['role_granted', 'allocation_created'\] |
