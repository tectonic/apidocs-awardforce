get:
  summary: List webooks
  tags:
    - Webhook
  parameters:
    - name: http_method
      in: query
      required: false
      description: |-
        - post
        - get
      schema:
        type: string
    - name: subscription_event
      in: query
      required: false
      description: |-
        - allocation_created
        - allocation_payment_created
        - allocation_payment_deleted
        - allocation_payment_status_changed
        - allocation_payment_updated
        - assignment_completed
        - assignment_created
        - collaborator_invited
        - document_created
        - document_deleted
        - document_updated
        - entry_created
        - entry_eligible
        - entry_ineligible
        - entry_moderated
        - entry_resubmitted
        - entry_submitted
        - entry_tagged
        - entry_updated
        - field_value_updated
        - membership_registered
        - payment_pending
        - payment_success
        - review_task_created
        - review_task_submitted
        - role_granted
        - user_updated
      schema:
        type: string
    - name: url
      in: query
      required: false
      description: URL of the webhook
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: string
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: string
    - name: order
      in: query
      required: false
      description: |-
        Column name to order by. The following options are available:
        - events
        - http_method
        - notification_emails
        - signing_keys
        - title
        - updated
        - url
      schema:
        type: string
    - name: dir
      in: query
      required: false
      description: |-
        - asc
        - desc
      schema:
        type: string
    - name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
  responses:
    '200':
      description: List webhooks
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Set-Cookie:
          schema:
            type: string
        Vary:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Content-Encoding:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              current_page:
                type: integer
              data:
                type: array
                items:
                  type: object
                  properties:
                    events:
                      type: array
                      items:
                        type: string
                    method:
                      type: string
                    name:
                      type: string
                    slug:
                      type: string
                    signing_key:
                      type: string
                    url:
                      type: string
                      format: uri
                    updated:
                      type: string
                      format: date-time
              first_page_url:
                type: string
                format: uri
              from:
                type: integer
              last_page:
                type: integer
              last_page_url:
                type: string
                format: uri
              next_page_url:
                type: string
              path:
                type: string
                format: uri
              per_page:
                type: integer
              prev_page_url:
                type: string
              to:
                type: integer
              total:
                type: integer
  description: Returns a list of webhooks.
post:
  summary: Create webhook
  tags:
    - Webhook
  parameters:
    - name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
  responses:
    '201':
      description: Create webhook
      headers:
        Date:
          schema:
            type: string
        Transfer-Encoding:
          schema:
            type: string
        Connection:
          schema:
            type: string
        Cache-Control:
          schema:
            type: string
        Location:
          schema:
            type: string
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        ETag:
          schema:
            type: string
        X-Frame-Options:
          schema:
            type: string
        X-XSS-Protection:
          schema:
            type: integer
        Strict-Transport-Security:
          schema:
            type: string
        Feature-Policy:
          schema:
            type: string
        Referrer-Policy:
          schema:
            type: string
        X-Content-Type-Options:
          schema:
            type: string
        Content-Security-Policy:
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              events:
                type: array
                items:
                  type: string
              method:
                type: string
              name:
                type: string
              slug:
                type: string
              signing_key:
                type: string
              url:
                type: string
                format: uri
              updated:
                type: string
                format: date-time
  description: >-
    Create a new webhook.


    **Supported webhook triggers:**


    - allocation_created
        
    - allocation_payment_created
        
    - allocation_payment_deleted
        
    - allocation_payment_status_changed
        
    - allocation_payment_updated
        
    - assignment_completed
        
    - assignment_created
        
    - collaborator_invited
        
    - document_created
        
    - document_deleted
        
    - document_updated
        
    - entry_created
        
    - entry_eligible
        
    - entry_ineligible
        
    - entry_moderated
        
    - entry_resubmitted
        
    - entry_submitted
        
    - entry_tagged
        
    - entry_updated
        
    - field_value_updated
        
    - membership_registered (User created)
        
    - payment_pending
        
    - payment_success
        
    - review_task_created
        
    - review_task_submitted
        
    - role_granted
        
    - user_updated
        

    | Parameter | Required | Type | Description |

    | --- | --- | --- | --- |

    | method | Yes | String | HTTP supported methods ("get"/"post") |

    | name | Yes | String | Name of the webhook |

    | url | Yes | String | URL for the webhook |

    | signing_key | No | String | Requests will be signed using this key and you
    can use it to validate the webhook payload. |

    | events | Yes | Array | List of events will trigger the webhook. Example:
    \['role_granted', 'allocation_created'\] |
