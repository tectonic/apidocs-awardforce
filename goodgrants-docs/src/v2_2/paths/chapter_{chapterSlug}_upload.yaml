parameters:
  - $ref: ../components/parameters/chapterSlug.yaml
post:
  summary: Upload a chapter file
  operationId: PostChapterUploadV22
  tags:
    - Chapter
  parameters:
    - $ref: ../components/parameters/Accept.yaml
  responses:
    '201':
      description: Chapter file uploaded.
      headers:
        Location:
          $ref: ../components/headers/Location.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UploadResult.yaml
  description: Uploads a file for the chapter identified by the specified slug.
