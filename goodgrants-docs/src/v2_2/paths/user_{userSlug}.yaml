get:
  summary: Get user
  operationId: GetUserV22
  tags:
    - User
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/userSlugParameter.yaml
  responses:
    '200':
      description: Get user
      headers:
        Date:
          $ref: ../components/headers/Date.yaml
        Transfer-Encoding:
          $ref: ../components/headers/Transfer-Encoding.yaml
        Connection:
          $ref: ../components/headers/Connection.yaml
        Vary:
          $ref: ../components/headers/Vary.yaml
        Cache-Control:
          $ref: ../components/headers/Cache-Control.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-Frame-Options:
          $ref: ../components/headers/X-Frame-Options.yaml
        X-XSS-Protection:
          $ref: ../components/headers/X-XSS-Protection.yaml
        Strict-Transport-Security:
          $ref: ../components/headers/Strict-Transport-Security.yaml
        Content-Encoding:
          $ref: ../components/headers/Content-Encoding.yaml
        Feature-Policy:
          $ref: ../components/headers/Feature-Policy.yaml
        Referrer-Policy:
          $ref: ../components/headers/Referrer-Policy.yaml
        X-Content-Type-Options:
          $ref: ../components/headers/X-Content-Type-Options.yaml
        Content-Security-Policy:
          $ref: ../components/headers/Content-Security-Policy.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              analytics_cookies:
                type: boolean
              broadcast_emails:
                type: boolean
              confirmed_at:
                type: string
                format: date-time
              created_at:
                type: string
                format: date-time
              created_by:
                type: string
              email:
                type: string
                format: email
              first_name:
                type: string
              language:
                type: object
                properties:
                  code:
                    type: string
                  language:
                    type: string
              last_name:
                type: string
              marketing_cookies:
                type: boolean
              mobile:
                type: string
                format: utc-millisec
              name:
                type: string
              necessary_cookies:
                type: boolean
              notification_emails:
                type: boolean
              notification_sms:
                type: boolean
              preferences:
                type: object
                properties:
                  broadcast_emails:
                    type: boolean
                  notification_emails:
                    type: boolean
                  notification_sms:
                    type: boolean
              roles:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
              slug:
                type: string
              social_sharing:
                type: boolean
              updated:
                type: string
                format: date-time
              user_fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
                    translated:
                      type: object
                      properties:
                        en_GB:
                          type: string
  description: >-
    Returns a user by email or by its 8-letter slug. The response consists of
    all user fields including files. Files include a download link.
put:
  summary: Update user
  operationId: PutUserV22
  tags:
    - User
  parameters:
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/userSlug.yaml
  responses:
    '200':
      description: Update user
      content:
        application/json:
          schema:
            type: object
            properties:
              analytics_cookies:
                type: boolean
              broadcast_emails:
                type: boolean
              confirmed_at:
                type: string
                format: date-time
              created_at:
                type: string
                format: date-time
              created_by:
                type: string
              email:
                type: string
                format: email
              first_name:
                type: string
              language:
                type: object
                properties:
                  code:
                    type: string
                  language:
                    type: string
              last_name:
                type: string
              marketing_cookies:
                type: boolean
              mobile:
                type: string
                format: utc-millisec
              name:
                type: string
              necessary_cookies:
                type: boolean
              notification_emails:
                type: boolean
              notification_sms:
                type: boolean
              preferences:
                type: object
                properties:
                  broadcast_emails:
                    type: boolean
                  notification_emails:
                    type: boolean
                  notification_sms:
                    type: boolean
              roles:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    name:
                      type: object
                      properties:
                        en_GB:
                          type: string
              slug:
                type: string
              social_sharing:
                type: boolean
              updated:
                type: string
                format: date-time
              user_fields:
                type: array
                items:
                  type: object
                  properties:
                    slug:
                      type: string
                    link:
                      type: string
                      format: uri
                    label:
                      type: object
                      properties:
                        en_GB:
                          type: string
                    value:
                      type: string
                    translated:
                      type: object
                      properties:
                        en_GB:
                          type: string
  description: >-
    Update an existing user.


    | Parameter | Required | Type | Description |

    | --- | --- | --- | --- |

    | first_name | No | String | User's first name |

    | last_name | No | String | User's last name |

    | password | No | String | Password for accessing the account |

    | email | No | String | User's email address |

    | mobile | No | String | User's mobile number |

    | roles | No | Array | Array of Role slugs |

    | preferences | No | Object | Object containing key / value pairs where keys
    can be any of the following:<br><br>- broadcast_emails<br><br>-
    notification_emails<br><br>- notification_sms<br><br>Values are of type
    Boolean |

    | user_fields | No | Object | Object containing key / value pairs. Where the
    key is the Field slug. e.g. "fJkIjGmB": "Test value" |
