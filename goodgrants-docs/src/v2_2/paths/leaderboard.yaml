get:
  summary: List leaderboard
  tags:
    - Leaderboard
  parameters:
    - name: score_set
      in: query
      required: false
      description: Score set slug (required)
      schema:
        type: string
    - name: entry
      in: query
      required: false
      description: Entry slug
      schema:
        type: string
    - name: category
      in: query
      required: false
      description: Category slug
      schema:
        type: string
    - name: chapter
      in: query
      required: false
      description: Chapter slug
      schema:
        type: string
    - name: tag
      in: query
      required: false
      description: All available tags in the program
      schema:
        type: string
    - name: archived
      in: query
      required: false
      description: |-
        - only
        - all
        - none
      schema:
        type: string
    - name: per_page
      in: query
      required: false
      description: Number between 1 and 100
      schema:
        type: string
    - name: page
      in: query
      required: false
      description: Number greater than 0
      schema:
        type: string
    - name: order
      in: query
      required: false
      description: |-
        Column name to order by. The following options are available:
        - category (slug)
        - chapter (slug)
        - division
        - link 
        - slug
        - status
        - submitted
        - auto_score
        - title
        - tags
      schema:
        type: string
    - name: dir
      in: query
      required: false
      description: |-
        - asc
        - desc
      schema:
        type: string
    - name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
  responses:
    default:
      description: List leaderboard
