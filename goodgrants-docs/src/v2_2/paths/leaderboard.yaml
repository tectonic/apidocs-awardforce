get:
  summary: Retrieve leaderboard results
  operationId: GetLeaderboardCollectionV22
  tags:
    - Leaderboard
  parameters:
    - $ref: ../components/parameters/leaderboardScoreSetFilter.yaml
    - $ref: ../components/parameters/categoryFilter.yaml
    - $ref: ../components/parameters/chapterFilter.yaml
    - $ref: ../components/parameters/entryFilter.yaml
    - $ref: ../components/parameters/tagFilter.yaml
    - $ref: ../components/parameters/archivedFilter.yaml
    - $ref: ../components/parameters/page.yaml
    - $ref: ../components/parameters/perPage.yaml
    - $ref: ../components/parameters/leaderboardOrder.yaml
    - $ref: ../components/parameters/sortDirection.yaml
    - $ref: ../components/parameters/Accept.yaml
    - $ref: ../components/parameters/X-Api-Language.yaml
  responses:
    '200':
      description: Leaderboard results retrieved.
      headers:
        ETag:
          $ref: ../components/headers/ETag.yaml
        X-RateLimit-Limit:
          $ref: ../components/headers/X-RateLimit-Limit.yaml
        X-RateLimit-Remaining:
          $ref: ../components/headers/X-RateLimit-Remaining.yaml
        X-RateLimit-Reset:
          $ref: ../components/headers/X-RateLimit-Reset.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/LeaderboardList.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '429':
      $ref: ../components/responses/TooManyRequests.yaml
    '503':
      $ref: ../components/responses/ServiceUnavailable.yaml
  description: Retrieves leaderboard results.
