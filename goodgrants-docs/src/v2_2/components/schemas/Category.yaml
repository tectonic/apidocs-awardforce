title: Category
description: |-
  Grant category that applications are submitted to.

  Includes the application form used for submissions, its translated name and description, the season it belongs to, and the rules that govern applications within it. Categories can be nested under a parent category and made available across one or more chapters.
allOf:
  - $ref: ./CategoryBase.yaml
  - type: object
    properties:
      chapters:
        type: array
        description: Chapters the category is available in.
        items:
          type: object
          properties:
            slug:
              type: string
              description: Short URL-safe identifier for the chapter.
            link:
              type: string
              format: uri
              description: Canonical URL for the chapter resource.
            name:
              type: object
              description: |-
                Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
              additionalProperties:
                type: string
      applicant_max_applications:
        type: integer
        nullable: true
        description: |-
          Maximum number of applications a single applicant may submit to this category.

          `null` when the number of applications is not capped.
      application_name_label:
        type: object
        description: |-
          Custom label for the application-name field shown to applicants.

          Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
      fill_application_name:
        type: boolean
        description: Specifies whether applicants are asked to name their application when submitting to this category.
      image_heading:
        type: object
        description: |-
          Heading shown above the category images.

          Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
      images:
        type: array
        description: Images attached to the category.
        items:
          type: object
          properties:
            token:
              type: string
              description: Token identifying the image file.
            link:
              type: string
              format: uri
              description: Canonical URL for the file resource.
            filename:
              type: string
              description: Original filename as uploaded.
            name:
              type: string
              description: Display name of the image.
            download:
              type: string
              format: uri
              description: Time-limited download URL for the image.
      max_image_width:
        type: integer
        description: Maximum display width for the category images, in pixels.
      packing_slip_instructions:
        type: object
        description: |-
          Instructions shown on the packing slip for the category.

          Map keyed by locale code (for example, `en_GB` or `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
        additionalProperties:
          type: string
      pdf_packing_slip:
        type: boolean
        description: Specifies whether a PDF packing slip is enabled for the category.
