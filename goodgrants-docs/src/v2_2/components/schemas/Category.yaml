allOf:
  - $ref: ./CategoryBase.yaml
  - type: object
    properties:
      chapters:
        type: array
        items:
          type: object
          properties:
            slug:
              type: string
            link:
              type: string
              format: uri
            name: &translatedText
              type: object
              additionalProperties:
                type: string
      applicant_max_applications:
        type: integer
        nullable: true
      application_name_label: *translatedText
      fill_application_name:
        type: boolean
      image_heading: *translatedText
      images:
        type: array
        items:
          type: object
          properties:
            token:
              type: string
            link:
              type: string
              format: uri
            filename:
              type: string
            name:
              type: string
            download:
              type: string
      max_image_width:
        type: integer
      packing_slip_instructions: *translatedText
      pdf_packing_slip:
        type: boolean