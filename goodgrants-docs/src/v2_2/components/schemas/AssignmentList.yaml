allOf:
  - $ref: ./Pagination.yaml
  - type: object
    properties:
      data:
        type: array
        items:
          type: object
          properties:
            application:
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                title:
                  type: string
            category:
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                name:
                  type: object
                  properties:
                    en_GB:
                      type: string
            chapter:
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                name:
                  type: object
                  properties:
                    en_GB:
                      type: string
            comments:
              type: object
              properties:
                judging:
                  type: array
                  items: &commentItem
                    type: object
                    properties:
                      slug:
                        type: string
                      comment:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                      user: &commentUser
                        type: object
                        properties:
                          slug:
                            type: string
                          link:
                            type: string
                            format: uri
                          name:
                            type: string
                          first_name:
                            type: string
                          last_name:
                            type: string
                abstention:
                  type: array
                  items: *commentItem
                conflict:
                  type: array
                  items: *commentItem
                criteria:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      comments:
                        type: array
                        items:
                          type: object
                          properties:
                            slug:
                              type: string
                            comment:
                              type: string
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
                            user: *commentUser
            created:
              type: string
              format: date-time
            form:
              type: string
            method:
              type: string
            panels:
              type: array
              items:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
            reviewer:
              nullable: true
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                name:
                  type: string
            role:
              nullable: true
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                name:
                  type: object
                  properties:
                    en_GB:
                      type: string
            rounds:
              type: array
              items:
                type: object
                properties:
                  slug:
                    type: string
                  link:
                    type: string
                    format: uri
                  name:
                    type: object
                    properties:
                      en_GB:
                        type: string
            score:
              description: |-
                Score for this assignment, formatted per the score-set
                mode (VIP, qualifying, top-pick, voting). Shape varies
                by mode; `null` when no score has been recorded.
              nullable: true
            score_set:
              type: object
              properties:
                slug:
                  type: string
                link:
                  type: string
                  format: uri
                name:
                  type: object
                  properties:
                    en_GB:
                      type: string
            slug:
              type: string
            status:
              type: string
            updated:
              type: string
              format: date-time