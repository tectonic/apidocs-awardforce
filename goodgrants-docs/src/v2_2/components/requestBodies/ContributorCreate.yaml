content:
  application/json:
    schema:
      type: object
      additionalProperties: false
      required:
        - application
        - tab
      properties:
        application:
          type: string
          pattern: '^[A-Za-z]{8}$'
          description: Slug of the application.
        tab:
          type: string
          pattern: '^[A-Za-z]{8}$'
          description: Slug of the contributor tab.
        fields:
          type: object
          description: Contributor field values keyed by field slug.
          additionalProperties:
            description: |-
              Value to submit for the field. The type depends on the field type — for example, a string for text fields or a boolean for checkbox fields.
description: Contributor creation payload.
required: true
