openapi: 3.0.0
info:
  title: Award Force API
  version: '2.2'
  description: API version 2.2
servers:
  - url: https://api.cr4ce.com
security:
  - ApiKeyAuth: []
paths:
  /account:
    get:
      summary: Get account
      tags:
        - Account
      parameters:
        - name: Accept
          in: header
          required: true
          description: Defines the response type.
          schema:
            type: string
        - name: x-api-language
          in: header
          required: false
          description: Defines expected language.
          schema:
            type: string
      responses:
        default:
          description: Get account
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: string
                    format: date-time
                  domains:
                    type: array
                    items:
                      type: string
                  global_id:
                    type: string
                  languages:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                  name:
                    type: string
                  owner:
                    type: object
                    properties:
                      slug:
                        type: string
                      link:
                        type: string
                        format: uri
                      name:
                        type: string
                      first_name:
                        type: string
                      last_name:
                        type: string
                  product:
                    type: string
                  region:
                    type: string
                  slug:
                    type: string
                  timezone:
                    type: string
                  updated:
                    type: string
                    format: date-time
      description: Returns the account's information based on the API key used in the header.
  /assignment:
    get:
      summary: List assignments
      tags:
        - Assignment
      parameters:
        - name: page
          in: query
          required: false
          description: Number greater than 0
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: Number between 1 and 100
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: |-
            - none
            - in_progress
            - complete
            - abstained
          schema:
            type: string
        - name: score_set
          in: query
          required: false
          description: Score Set slug
          schema:
            type: string
        - name: panel
          in: query
          required: false
          description: Panel slug
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: Tag
          schema:
            type: string
        - name: season
          in: query
          required: false
          description: Season slug
          schema:
            type: string
        - name: method
          in: query
          required: false
          description: |-
            - automatic
            - manual
            - random
            - stray
          schema:
            type: string
        - name: judge
          in: query
          required: false
          description: Judge slug
          schema:
            type: string
        - name: state
          in: query
          required: false
          description: |-
            - undecided
            - approved
            - rejected
          schema:
            type: string
        - name: chapter
          in: query
          required: false
          description: Chapter slug
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: Category slug
          schema:
            type: string
        - name: Accept
          in: header
          required: true
          description: Defines the response type.
          schema:
            type: string
        - name: x-api-language
          in: header
          required: false
          description: Defines expected language.
          schema:
            type: string
      responses:
        '200':
          description: List assignments
          headers:
            Server:
              schema:
                type: string
            Transfer-Encoding:
              schema:
                type: string
            Connection:
              schema:
                type: string
            Vary:
              schema:
                type: string
            X-Powered-By:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
            Date:
              schema:
                type: string
            X-RateLimit-Limit:
              schema:
                type: integer
            X-RateLimit-Remaining:
              schema:
                type: integer
            X-RateLimit-Reset:
              schema:
                type: integer
            ETag:
              schema:
                type: string
            Content-Encoding:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_page:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        application:
                          type: object
                          properties:
                            slug:
                              type: string
                            link:
                              type: string
                              format: uri
                            title:
                              type: string
                        category:
                          type: object
                          properties:
                            slug:
                              type: string
                            link:
                              type: string
                              format: uri
                            name:
                              type: object
                              properties:
                                en_GB:
                                  type: string
                        chapter:
                          type: object
                          properties:
                            slug:
                              type: string
                            link:
                              type: string
                              format: uri
                            name:
                              type: object
                              properties:
                                en_GB:
                                  type: string
                        comments:
                          type: object
                          properties:
                            judging:
                              type: array
                              items:
                                type: object
                                properties:
                                  slug:
                                    type: string
                                  comment:
                                    type: string
                                  created_at:
                                    type: string
                                    format: date-time
                                  updated_at:
                                    type: string
                                    format: date-time
                                  user:
                                    type: object
                                    properties:
                                      slug:
                                        type: string
                                      link:
                                        type: string
                                        format: uri
                                      name:
                                        type: string
                                      first_name:
                                        type: string
                                      last_name:
                                        type: string
                            abstention:
                              type: array
                              items:
                                type: object
                                properties:
                                  slug:
                                    type: string
                                  comment:
                                    type: string
                                  created_at:
                                    type: string
                                    format: date-time
                                  updated_at:
                                    type: string
                                    format: date-time
                                  user:
                                    type: object
                                    properties:
                                      slug:
                                        type: string
                                      link:
                                        type: string
                                        format: uri
                                      name:
                                        type: string
                                      first_name:
                                        type: string
                                      last_name:
                                        type: string
                            conflict:
                              type: array
                              items:
                                type: object
                                properties:
                                  slug:
                                    type: string
                                  comment:
                                    type: string
                                  created_at:
                                    type: string
                                    format: date-time
                                  updated_at:
                                    type: string
                                    format: date-time
                                  user:
                                    type: object
                                    properties:
                                      slug:
                                        type: string
                                      link:
                                        type: string
                                        format: uri
                                      name:
                                        type: string
                                      first_name:
                                        type: string
                                      last_name:
                                        type: string
                            criteria:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  comments:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        slug:
                                          type: string
                                        comment:
                                          type: string
                                        created_at:
                                          type: string
                                          format: date-time
                                        updated_at:
                                          type: string
                                          format: date-time
                                        user:
                                          type: object
                                          properties:
                                            slug:
                                              type: string
                                            link:
                                              type: string
                                              format: uri
                                            name:
                                              type: string
                                            first_name:
                                              type: string
                                            last_name:
                                              type: string
                        created:
                          type: string
                          format: date-time
                        form:
                          type: string
                        method:
                          type: string
                        panels:
                          type: array
                          items: {}
                        reviewer:
                          type: object
                          properties:
                            slug:
                              type: string
                            link:
                              type: string
                              format: uri
                            name:
                              type: string
                        role:
                          nullable: true
                        rounds:
                          type: array
                          items:
                            type: object
                            properties:
                              slug:
                                type: string
                              link:
                                type: string
                                format: uri
                              name:
                                type: object
                                properties:
                                  en_GB:
                                    type: string
                        score_set:
                          type: object
                          properties:
                            slug:
                              type: string
                            link:
                              type: string
                              format: uri
                            name:
                              type: object
                              properties:
                                en_GB:
                                  type: string
                        slug:
                          type: string
                        status:
                          type: string
                        updated:
                          type: string
                          format: date-time
                  first_page_url:
                    type: string
                    format: uri
                  from:
                    type: integer
                  last_page:
                    type: integer
                  last_page_url:
                    type: string
                    format: uri
                  next_page_url:
                    type: string
                  path:
                    type: string
                    format: uri
                  per_page:
                    type: integer
                  prev_page_url:
                    type: string
                  to:
                    type: integer
                  total:
                    type: integer
      description: List all assignments.
    post:
      summary: Create assignment
      tags:
        - Assignment
      parameters:
        - name: Accept
          in: header
          required: true
          description: Defines the response type.
          schema:
            type: string
      responses:
        '202':
          description: Create assignment
          headers:
            Server:
              schema:
                type: string
            Transfer-Encoding:
              schema:
                type: string
            Connection:
              schema:
                type: string
            X-Powered-By:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
            Date:
              schema:
                type: string
            X-RateLimit-Limit:
              schema:
                type: integer
            X-RateLimit-Remaining:
              schema:
                type: integer
            X-RateLimit-Reset:
              schema:
                type: integer
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
      description: |-
        Create a new assignment.

        | Parameter | Required | Type | Description |
        | --- | --- | --- | --- |
        | score_set | Yes | String | Score Set slug |
        | entries | Yes | Array | List of Entry slugs |
        | judges | Yes | Array | List of Judge slugs |
        | rounds | Yes | Array | List of Round slugs |
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                score_set:
                  type: string
                entries:
                  type: array
                  items:
                    type: string
                judges:
                  type: array
                  items:
                    type: string
                rounds:
                  type: array
                  items:
                    type: string
