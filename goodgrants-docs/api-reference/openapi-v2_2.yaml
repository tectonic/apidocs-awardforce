  headers:
    ETag:
      description: Entity tag for the selected representation.
      schema:
        type: string
    X-RateLimit-Limit:
      description: Request limit for the current rate-limit window.
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: Remaining requests in the current rate-limit window.
      schema:
        type: integer
    X-RateLimit-Reset:
      description: Reset value for the current rate-limit window.
      schema:
        type: integer
    Retry-After:
      description: Number of seconds the client should wait before retrying.
      schema:
        type: integer
      example: 60
    Location:
      description: URI of the resource created or referenced by the response.
      schema:
        type: string
  schemas:
    Account:
      type: object
      title: Account
      description: |-
        Tenant-level account record describing the subscription and configuration shared by every resource within it.

        Each account has one owner, one product tier, a region, a timezone, and a set of enabled locales. The locale codes here are the keys used by translation maps elsewhere in the API (such as category, chapter, round, and score-set names).
      properties:
        created:
          type: string
          format: date-time
          description: Time the account was created.
        domains:
          type: array
          description: |-
            Hostnames associated with the account.

            Includes the primary public domain and any staging or local mirrors configured for the account.
          items:
            type: string
        global_id:
          type: string
          format: uuid
          description: |-
            Globally unique identifier for the account.

            Stable across slug changes and consistent across the platform.
        languages:
          type: array
          description: |-
            Locales enabled for the account.

            Translation maps on other resources (such as category, round, and score-set names) are keyed by these codes.
          items:
            type: object
            properties:
              code:
                type: string
                description: Locale code, for example `en_GB` or `en_US`.
        name:
          type: string
          description: Display name of the account.
        owner:
          type: object
          description: User who owns the account.
          properties:
            slug:
              type: string
              description: Short URL-safe identifier for the owner.
            link:
              type: string
              format: uri
              description: Canonical URL for the owner resource.
            name:
              type: string
              description: Full display name of the owner.
            first_name:
              type: string
              description: Given name of the owner.
            last_name:
              type: string
              description: Family name of the owner.
        product:
          type: string
          description: |-
            Subscription plan tier the account is on.

            Resolved from the underlying plan code, for example `Premium`.
        region:
          type: string
          description: |-
            Deployment region the account is hosted in.

            Two-letter region code, for example `au` or `eu`.
        slug:
          type: string
          description: Short URL-safe identifier for the account.
        timezone:
          type: string
          description: |-
            Timezone the account uses for date calculations.

            Returned as a concatenated IANA identifier without the slash separator, for example `EuropeLondon`.
        updated:
          type: string
          format: date-time
          description: Time the account record was last updated.
      example:
        created: '2025-01-15T09:00:00Z'
        domains:
          - awards.example.com
        global_id: 6a0c6f70-1b9e-4d63-9c2a-2f8c5d0a1c34
        languages:
          - code: en_GB
          - code: en_US
        name: Example
        owner:
          slug: AbCdEfGh
          link: https://api.au.cr4ce.com/user/AbCdEfGh
          name: Jane Doe
          first_name: Jane
          last_name: Doe
        product: payment-subscriptions.form.plan-premium.label
        region: au
        slug: WxYzAbCd
        timezone: EuropeLondon
        updated: '2025-06-20T14:30:00Z'
    BaseProblem:
      description: Standard error envelope shared by every error response on this API.
      type: object
      properties:
        message:
          type: string
        status_code:
          type: integer
          minimum: 400
          maximum: 599
    BadRequest:
      allOf:
        - $ref: '#/components/schemas/BaseProblem'
        - type: object
          properties:
            status_code:
              type: integer
              minimum: 400
              maximum: 400
    Unauthorized:
      allOf:
        - $ref: '#/components/schemas/BaseProblem'
        - type: object
          properties:
            status_code:
              type: integer
              minimum: 401
              maximum: 401
    Forbidden:
      allOf:
        - $ref: '#/components/schemas/BaseProblem'
        - type: object
          properties:
            status_code:
              type: integer
              minimum: 403
              maximum: 403
    TooManyRequests:
      allOf:
        - $ref: '#/components/schemas/BaseProblem'
        - type: object
          properties:
            status_code:
              type: integer
              minimum: 429
              maximum: 429
    Pagination:
      type: object
      title: Pagination
      description: |-
        Pagination envelope returned by every list endpoint.

        Wraps the result set with positional fields (`current_page`, `from`, `to`, `total`) and navigation URLs (`first_page_url`, `last_page_url`, `next_page_url`, `prev_page_url`) for traversing the full list. The records themselves are returned in a sibling `data` array supplied by the wrapping schema.
      properties:
        current_page:
          type: integer
          description: Number of the page returned by this response. The first page is `1`.
        first_page_url:
          type: string
          format: uri
          description: URL of the first page in the result set.
        from:
          type: integer
          description: Position of the first record on this page within the full result set. The first record is at position `1`.
        last_page:
          type: integer
          description: Number of the last page. Equals the total number of pages.
        last_page_url:
          type: string
          format: uri
          description: URL of the last page in the result set.
        next_page_url:
          type: string
          description: |-
            URL of the next page in the result set.

            Empty string when the current page is the last page.
        path:
          type: string
          format: uri
          description: Canonical URL of the endpoint, without query parameters.
        per_page:
          type: integer
          description: Maximum number of records returned per page.
        prev_page_url:
          type: string
          description: |-
            URL of the previous page in the result set.

            Empty string when the current page is the first page.
        to:
          type: integer
          description: Position of the last record on this page within the full result set.
        total:
          type: integer
          description: Total number of records across all pages.
    Assignment:
      type: object
      title: Assignment
      description: |-
        Single scoring task for an application, addressed to either a reviewer or a role within a given round and score set.

        Created automatically by panel allocation rules or manually by a panel manager. Lifecycle is tracked in `status`; the scoring outcome lives in `score`.

        Exactly one of `reviewer` and `role` is populated.
      properties:
        application:
          type: object
          description: Application the assignment refers to.
          properties:
            slug:
              type: string
              description: Short URL-safe identifier for the application.
            link:
              type: string
              format: uri
              description: Canonical URL for the application resource.
            title:
              type: string
              description: Title of the application as submitted by the applicant.
        category:
          type: object
          description: Category the application belongs to.
          properties:
            slug:
              type: string
              description: Short URL-safe identifier for the category.
            link:
              type: string
              format: uri
              description: Canonical URL for the category resource.
            name:
              type: object
              description: Map keyed by locale code (for example `en_GB`, `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
              additionalProperties:
                type: string
        chapter:
          type: object
          description: Chapter the category belongs to.
          properties:
            slug:
              type: string
              description: Short URL-safe identifier for the chapter.
            link:
              type: string
              format: uri
              description: Canonical URL for the chapter resource.
            name:
              type: object
              description: Map keyed by locale code (for example `en_GB`, `fr_FR`). Keys are drawn from the languages enabled on the account. Values are the translated string.
              additionalProperties:
                type: string
        comments:
          type: object
          nullable: true
          description: |-
            Comments attached to the assignment.

            `null` for role-based assignments (where `role` is populated and `reviewer` is absent), since role holders do not own per-assignment comment threads.
          properties:
            judging:
              type: array
              description: Comments left by the reviewer during scoring.
              items:
                type: object
                properties:
                  slug:
                    type: string
                    description: Short URL-safe identifier for the comment.
                  comment:
                    type: string
                    description: |-
                      Comment body as an HTML fragment.

                      May contain block-level tags such as `<p>`. Empty string when the user saved a comment with no content.
                  created_at:
                    type: string
                    format: date-time
                    description: Time the comment was created.
                  updated_at:
                    type: string
                    format: date-time
                    description: Time the comment was last updated.
                  user:
                    type: object
                    description: User who left the comment.
                    properties:
                      slug:
                        type: string
                        description: Short URL-safe identifier for the user.
                      link:
                        type: string
                        format: uri
                        description: Canonical URL for the user resource.
                      name:
                        type: string
                        description: Full display name of the user.
                      first_name:
                        type: string
                        description: Given name of the user.
                      last_name:
                        type: string
                        description: Family name of the user.
            abstention:
              type: array
              description: Comments left when the reviewer marked the application as abstained.
              items:
                type: object
                properties:
                  slug:
                    type: string
                    description: Short URL-safe identifier for the comment.
                  comment:
                    type: string
                    description: |-
                      Comment body as an HTML fragment.

                      May contain block-level tags such as `<p>`. Empty string when the user saved a comment with no content.
                  created_at:
                    type: string
                    format: date-time
                    description: Time the comment was created.
                  updated_at:
                    type: string
                    format: date-time
                    description: Time the comment was last updated.
                  user:
                    type: object
                    description: User who left the comment.
                    properties:
                      slug:
                        type: string
                        description: Short URL-safe identifier for the user.
                      link:
                        type: string
                        format: uri
                        description: Canonical URL for the user resource.
                      name:
                        type: string
                        description: Full display name of the user.
                      first_name:
                        type: string
