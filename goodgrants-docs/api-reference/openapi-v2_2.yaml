                    additionalProperties:
                      type: string
              template:
                type: string
                pattern: ^[A-Za-z]{8}$
                description: Slug of the document template to generate the document from.
              fileType:
                type: string
                enum:
                  - PDF
                  - Word
                  - accessible-pdf
                description: |-
                  File format to generate the document in.

                  Use `accessible-pdf` to generate a tagged, accessible PDF.
