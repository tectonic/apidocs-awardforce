components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: |-
        API key used to authenticate and authorise every request.
        Include it in the `x-api-key` header.
  parameters:
    Accept:
      name: Accept
      in: header
      required: true
      description: Defines the response type.
      schema:
        type: string
        enum:
          - application/vnd.Creative Force.v2.2+json
          - application/vnd.Creative Force.v2.2+xml
    X-Api-Language:
      name: x-api-language
      in: header
      required: false
      description: |-
        Defines the languages included in the response. If omitted, the account default language is used.

        Value `all` overrides any other values present.
      style: simple
      explode: false
      schema:
        type: array
        items:
          type: string
          enum:
            - all
            - ar_AR
            - bg_BG
            - bn_IN
            - ca_ES
            - cs_CZ
            - cy_GB
            - da_DK
            - de_DE
            - en_GB
            - en_US
            - el_GR
            - es_NN
            - es_LA
            - et_EE
            - fa_NN
            - fi_FI
            - fr_FR
            - fr_CA
            - he_IL
            - hi_IN
            - hr_HR
            - hu_HU
            - hy_AM
            - it_IT
            - ja_JP
            - ko_KR
            - lt_LT
            - ms_MY
            - nl_NL
            - nb_NO
            - pl_PL
            - pt_BR
            - ro_RO
            - ru_RU
            - sk_SK
            - sl_SI
            - sq_AL
            - sr_RS
            - sv_SE
            - sw_NN
            - th_TH
            - tr_TR
            - uk_UA
            - vi_VN
            - zh_CN
            - zh_HK
      example:
        - en_GB
        - fr_FR
    assignmentSlugFilter:
      name: slug
      in: query
      required: false
      description: Filter to a single assignment by slug. Returns at most one item.
      schema:
        type: string
        pattern: ^[A-Za-z0-9]{24}[JR]$
    assignmentStatusFilter:
      name: status
      in: query
      required: false
      description: Filter by assignment status.
      schema:
        type: string
        enum:
          - none
          - in_progress
          - complete
          - abstained
    categoryFilter:
      name: category
      in: query
      required: false
      description: Filter by category slug.
      schema:
        type: string
    chapterFilter:
      name: chapter
      in: query
      required: false
      description: Filter by chapter slug.
      schema:
        type: string
    judgeFilter:
      name: judge
      in: query
      required: false
      description: Filter by reviewer slug.
      schema:
        type: string
    methodFilter:
      name: method
      in: query
      required: false
      description: Filter by assignment method.
      schema:
        type: string
        enum:
          - automatic
          - manual
          - random
          - stray
          - recused
    panelFilter:
      name: panel
      in: query
      required: false
      description: Filter by panel slug.
      schema:
        type: string
    scoreSetFilter:
      name: score_set
      in: query
      required: false
      description: Filter by score set slug.
      schema:
        type: string
    seasonFilter:
      name: season
      in: query
      required: false
      description: |-
        Filter by season slug.
        Use `all` to show all seasons.
      schema:
        type: string
    stateFilter:
      name: state
      in: query
      required: false
      description: |-
        Filter by application state.
        * `current` - Only current (non-archived) applications.
        * `archived` - Only archived applications.
        * `all` - Include both current and archived applications.
        * `only` - Equivalent to `archived`.
        * `none` - Exclude all applications.
      schema:
        type: string
        enum:
          - current
          - archived
          - all
          - only
          - none
    tagFilter:
      name: tag
      in: query
      required: false
      description: Filter by tag.
      schema:
        type: string
    deletedFilter:
      name: deleted
      in: query
      required: false
      description: |-
        Filter by deletion mode.
        * `only` - Show only deleted resources.
        * `included` - Include deleted resources.
        * `none` - Exclude deleted resources.
      schema:
        type: string
        enum:
          - only
          - included
          - none
    trashedFilter:
      name: trashed
      in: query
      required: false
      description: |-
        Filter by soft-deletion mode.
        * `only` - Show only soft-deleted resources.
        * `all` - Include soft-deleted resources alongside live ones.
        * `none` - Exclude soft-deleted resources.
      schema:
        type: string
        enum:
          - only
          - all
          - none
    page:
      name: page
      in: query
      required: false
      description: Specify the page number to return.
      schema:
        type: string
    perPage:
      name: per_page
      in: query
      required: false
      description: Limit the number of items returned to between 1 and 100.
      schema:
        type: string
    assignmentOrder:
      name: order
      in: query
      required: false
      description: |-
        Sort by a supported assignment column. Unsupported values fall back
        silently to the default sort (`updated` descending).
      schema:
        type: string
        enum:
          - method
          - status
          - updated
    sortDirection:
      name: dir
      in: query
      required: false
      description: Sort in ascending or descending order.
      schema:
        type: string
        enum:
          - asc
          - desc
    assignmentSlug:
      name: assignment_slug
      in: path
      required: true
      description: Slug of the assignment.
      schema:
        type: string
        pattern: ^[A-Za-z0-9]{24}[JR]$
    entrySlug:
      name: application_slug
      in: path
      required: true
      description: Slug of the application.
      schema:
        type: string
        pattern: ^[A-Za-z]{8}$
    entryFilter:
      name: application
      in: query
      required: false
      description: Filter by application slug.
      schema:
        type: string
    tabFilter:
      name: tab
      in: query
      required: false
      description: Filter by tab slug.
      schema:
        type: string
    attachmentOrder:
      name: order
      in: query
      required: false
      description: |-
        Sort by a supported attachment field. Unsupported values fall back
        silently to the default sort (`updated` descending).
      schema:
        type: string
        enum:
          - created
          - entry
          - order
          - tab
          - updated
    token:
      name: token
      in: path
      description: Token string.
      required: true
      schema:
        type: string
        pattern: ^[A-Za-z0-9]{16}$|^[A-Za-z0-9]{32}$
    tabSlug:
      name: tab_slug
      in: path
      required: true
      description: Application tab slug
      schema:
        type: string
        pattern: ^[A-Za-z]{8}$
    activeInactiveStatusFilter:
      name: status
      in: query
      required: false
      description: Filter by status.
      schema:
        type: string
        enum:
          - active
          - inactive
    formFilter:
      name: form
      in: query
      required: false
      description: |-
        Filter by form slug.

        Use the value `all` to include results from every form rather than a single form.
      schema:
        type: string
    parentCategoryFilter:
      name: parent
      in: query
      required: false
      description: Filter by parent category slug.
      schema:
        type: string
    categoryOrder:
      name: order
      in: query
      required: false
      description: |-
        Sort by a supported category field.
        * `parent` - Sort by parent slug.
        * `season` - Sort by season slug.
      schema:
        type: string
        enum:
          - chapter_count
          - created
          - divisions
          - application_count
          - form
          - name
          - parent
          - promoted
          - season
          - shortcode
          - status
          - updated
    categorySlug:
      name: category_slug
      in: path
      required: true
      description: Slug of the category.
      schema:
        type: string
        pattern: ^[A-Za-z]{8}$
    chapterOrder:
      name: order
      in: query
      required: false
      description: Sort by a supported chapter field.
      schema:
        type: string
        enum:
          - created
          - name
          - season
          - status
          - updated
    chapterSlug:
      name: chapter_slug
      in: path
      required: true
      description: Slug of the chapter.
      schema:
        type: string
        pattern: ^[A-Za-z]{8}$
    entryStatusFilter:
      name: status
      in: query
      required: false
      description: Filter by application status.
      schema:
        type: string
        enum:
          - submitted
          - in_progress
          - resubmission_required
          - resubmitted
    entryPaymentStatusFilter:
      name: payment_status
      in: query
      required: false
      description: Filter by payment status.
      schema:
        type: string
        enum:
          - paid
          - awaiting_payment
    entryModerationFilter:
      name: moderation
      in: query
      required: false
      description: Filter by moderation status.
      schema:
        type: string
        enum:
          - approved
          - undecided
          - rejected
    entryReviewStatusFilter:
      name: review_status
      in: query
      required: false
      description: Filter by review status.
      schema:
        type: string
    contributorOrder:
      name: order
      in: query
      required: false
      description: Sort by a supported contributor field. Custom contributor field slugs are also accepted.
      schema:
        type: string
        enum:
          - application
