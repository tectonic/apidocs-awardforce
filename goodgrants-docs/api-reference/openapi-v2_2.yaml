                    description: Values keyed by existing and enabled language code.
                    additionalProperties:
                      type: string
                  application_name_label:
                    type: object
                    description: Values keyed by existing and enabled language code.
                    additionalProperties:
                      type: string
                  image_heading:
                    type: object
                    description: Values keyed by existing and enabled language code.
                    additionalProperties:
                      type: string
                  packing_slip_instructions:
                    type: object
